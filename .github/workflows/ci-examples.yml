name: CI — Examples, Unit Tests & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-coverage:
    name: Tests & Coverage / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # examples/minimal pins the heavier deps (sklearn, fastapi, shap);
        # templates/tests/unit/ only need pytest + light helpers from
        # common_utils. One install covers both.
        # Audit Medium-2: pyarrow (Parquet for prediction_logger tests) and
        # pytest-asyncio (async client tests in test_api.py) were missing,
        # so coverage looked clean while real tests silently skipped.
        run: |
          pip install -r examples/minimal/requirements.txt
          pip install pytest pytest-cov pytest-asyncio
          # common_utils imports + integration test deps
          pip install pandas numpy pyyaml jsonschema pyarrow httpx

      - name: Train model (prerequisite for examples tests)
        run: python examples/minimal/train.py
        working-directory: ${{ github.workspace }}

      - name: Run full test + coverage matrix
        # Coverage now measures the actual surface area shipped to users:
        #   - examples/minimal: the smallest demo
        #   - templates/common_utils: the helper library reused by services
        #   - templates/service: the canonical service template
        # Tests run against:
        #   - examples/minimal/test_service.py (E2E demo)
        #   - templates/service/tests/test_explainer.py (SHAP wrapper)
        #   - templates/tests/unit/* (10 unit tests for helpers)
        # Excludes templates/service/tests/{test_api,test_training,contract}/*
        # because those exercise the *scaffolded* service (uvicorn lifespan,
        # mocked model) and live in a different import context. They are
        # validated end-to-end by validate-templates.yml::scaffold-e2e.
        run: |
          pytest \
            examples/minimal/test_service.py \
            templates/service/tests/test_explainer.py \
            templates/tests/unit/ \
            --cov=examples/minimal \
            --cov=templates/common_utils \
            --cov=templates/service/app \
            --cov-config=pyproject.toml \
            --cov-report=xml \
            --cov-report=term-missing \
            -v --tb=short
        working-directory: ${{ github.workspace }}

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: full-suite
          name: full-suite-py${{ matrix.python-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
