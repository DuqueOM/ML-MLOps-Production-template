name: CI — Examples & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-examples:
    name: Test Examples / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r examples/minimal/requirements.txt pytest pytest-cov

      - name: Train model (required before running tests)
        run: python examples/minimal/train.py
        working-directory: ${{ github.workspace }}

      - name: Run tests with coverage
        run: |
          pytest examples/minimal/test_service.py \
            templates/service/tests/test_explainer.py \
            --cov=examples/minimal \
            --cov-config=pyproject.toml \
            --cov-report=xml \
            --cov-report=term-missing \
            -v --tb=short
        working-directory: ${{ github.workspace }}

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: examples
          name: examples-py${{ matrix.python-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
