# Validate Templates CI
# Proves the repo is alive — validates K8s, Terraform, and Python templates.
# Runs on every push and PR to main.

name: Validate Templates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------
  # Self-audit (ADR-014 §3.3, gap #16)
  # The template prescribes gitleaks/tfsec/checkov/trivy for downstream
  # services. Apply the same tooling to the template repo itself — a
  # template that does not pass its own gates is not credible.
  # ---------------------------------------------------------------------
  self-audit:
    name: Self-audit (gitleaks + tfsec + checkov + trivy fs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # for sarif upload
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs history

      # 1. gitleaks — secret scanning over committed files + git history.
      #    Failure means a credential pattern was committed; D-17 violation.
      - name: gitleaks (D-17)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Hardcoded credential patterns the template specifically warns
      #    about. Mirror of the security-audit job inside the service CI
      #    (templates/cicd/ci.yml) — applied to the template's own files.
      - name: Hardcoded credential patterns (D-17 redux)
        run: |
          set -euo pipefail
          # Exclude this workflow file (matches its own greps as strings) and
          # the rule files that DOCUMENT the patterns to refuse.
          EXCLUDE='--exclude-dir=.git --exclude-dir=node_modules
                   --exclude=*.lock --exclude=*.png --exclude=*.gif'
          if grep -rEI $EXCLUDE \
                 "AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{50,}" \
                 --include="*.py" --include="*.yaml" --include="*.yml" \
                 --include="*.tf" --include="*.json" --include="*.md" \
                 --include="*.sh" .; then
            echo "::error::Hardcoded credential pattern detected in the template repo (D-17)."
            exit 1
          fi
          # Direct os.environ access for secret-shaped names — production code only.
          # Excludes: tests, docs, ADRs, runbooks (documenting the anti-pattern).
          if grep -rEI \
                 "os\.environ\[.(API_KEY|SECRET|TOKEN|PASSWORD)" \
                 --include="*.py" \
                 --exclude-dir=tests --exclude-dir=docs \
                 templates/ scripts/; then
            echo "::error::Direct os.environ on secret-named keys (D-17). Use common_utils.secrets.get_secret."
            exit 1
          fi

      # 3. tfsec — Terraform security checks against the template's own IaC.
      - name: tfsec (Terraform IaC — GCP)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: templates/infra/terraform/gcp
          soft_fail: true   # warn-only on first run; flip to false after triage
          format: lovely

      - name: tfsec (Terraform IaC — AWS)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: templates/infra/terraform/aws
          soft_fail: true
          format: lovely

      # 4. Checkov — broader IaC checks (Terraform + K8s + Dockerfile).
      - name: Checkov (IaC + K8s + Dockerfile)
        uses: bridgecrewio/checkov-action@v12.2752.0
        with:
          directory: templates/
          framework: terraform,kubernetes,dockerfile
          quiet: true
          soft_fail: true   # warn-only initially; remove after first clean run

      # 5. Trivy filesystem scan — catches CVEs in committed manifests
      #    (e.g. base images referenced in Dockerfile, requirements.txt).
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: templates/
          severity: CRITICAL,HIGH
          exit-code: "0"   # warn-only initially; flip to "1" after first clean run
          format: table

      # 6. Toolchain-install hygiene (PR-R2-5, audit R2 §5).
      #    The audit called out `curl -s … | bash` and
      #    `releases/latest/download/` as the two weak links in the
      #    supply-chain story: they run arbitrary upstream shell code
      #    and they pin to a moving target that can change behaviour
      #    between two CI runs. The canonical replacement is a pinned
      #    direct-release-tarball download (see golden-path.yml and
      #    validate-templates.yml itself for examples).
      - name: Toolchain install hygiene (PR-R2-5)
        run: |
          set -euo pipefail
          status=0
          search_dirs=".github/workflows templates/cicd"

          # Drop grep-format lines that are YAML comments
          # (`file:lineno:     # ...`). This lint scans every workflow
          # — including itself — so the patterns below are assembled
          # from concatenated string fragments to avoid self-matching
          # without needing to exclude validate-templates.yml from its
          # own scan (which would create a coverage hole).
          filter() {
            grep -vE '^[^:]+:[0-9]+:[[:space:]]*#' || true
          }

          # Patterns are assembled from concatenated halves so this
          # script's own source does not contain the literal forbidden
          # strings — keeps the lint self-stable without self-exclusion
          # tricks beyond the file filter above.
          pat_pipe='curl[^|]*[|][[:space:]]*bash'
          pat_latest='releases/'"latest"'/download/'
          pat_install_sh='install_'"kustomize"'.sh'

          # A. No curl-piped-into-shell anywhere in workflow YAML.
          hits=$(grep -rnE "$pat_pipe" \
                   --include='*.yml' --include='*.yaml' $search_dirs \
                 | filter)
          if [ -n "$hits" ]; then
            echo "::error::Found curl-piped-into-shell in a workflow (see PR-R2-5):"
            echo "$hits"
            status=1
          fi

          # B. Always pin the version, never use the moving 'latest' alias.
          hits=$(grep -rnE "$pat_latest" \
                   --include='*.yml' --include='*.yaml' $search_dirs \
                 | filter)
          if [ -n "$hits" ]; then
            echo "::error::Unpinned release URL detected (PR-R2-5). Use '/releases/download/<explicit-version>/'."
            echo "$hits"
            status=1
          fi

          # C. Deny-listed installer shell script from the upstream
          # kustomize hack/ directory — this was the concrete failure
          # reported by the audit.
          hits=$(grep -rn "$pat_install_sh" \
                   --include='*.yml' --include='*.yaml' $search_dirs \
                 | filter)
          if [ -n "$hits" ]; then
            echo "::error::Deny-listed kustomize installer detected (PR-R2-5). Use the direct /releases/download/ tarball."
            echo "$hits"
            status=1
          fi

          exit $status

      # 7. Markdown link-check (lightweight; full link-check moves to
      #    Phase 5 §5.2 alongside markdown-link-check + spell).
      - name: Quick check that AGENTS.md cites no broken local files
        run: |
          set -euo pipefail
          # Extract markdown links pointing at local files (not http/https).
          # Fail if any cited path does not exist.
          missing=0
          while read -r path; do
            [ -z "$path" ] && continue
            if [ ! -e "$path" ] && [ ! -e "$(dirname AGENTS.md)/$path" ]; then
              echo "::error file=AGENTS.md::referenced path not found: $path"
              missing=$((missing + 1))
            fi
          done < <(grep -oE '\]\([^)]+\.(md|py|yaml|yml|sh|json|toml|tf)\)' AGENTS.md \
                     | sed -E 's/^\]\(//;s/\)$//' | grep -v '^http')
          [ "$missing" -eq 0 ] || exit 1


  python-quality:
    name: Python Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit + local-hook deps
        # The pre-commit framework itself + the deps the LOCAL hooks
        # need (validate-agentic, ci-autofix-policy-contract). Remote
        # hooks (black/isort/flake8/mypy/bandit/gitleaks) bring their
        # own envs via pre-commit; only locals share this Python.
        run: |
          pip install pre-commit
          pip install pytest pyyaml jsonschema

      - name: Run pre-commit hooks (black, isort, flake8, gitleaks)
        # Single source of truth for versions: .pre-commit-config.yaml.
        # Prevents version drift between CI and local pre-commit install.
        # Runs all commit-stage hooks (excludes pre-push scaffold smoke).
        run: pre-commit run --all-files --hook-stage commit

      - name: Schema-validation wiring (PR-R2-4, audit R2)
        # Pandera ServiceInputSchema must be the SINGLE SOURCE OF TRUTH
        # consumed by training, serving, AND drift detection. The audit
        # found serving + drift bypassed it; this lint guards against
        # silent regressions.
        #
        # Required wiring:
        #   * fastapi_app.py imports validate_predict_payload AND calls it
        #   * fastapi_app.py imports validate_predict_batch AND calls it
        #   * drift_detection.py imports validate_drift_dataframe AND calls it
        #   * app/_pandera_schema.py exists (lazy resolver for {service}.schemas)
        run: |
          set -euo pipefail
          status=0
          fastapi_app="templates/service/app/fastapi_app.py"
          drift_py="templates/service/src/{service}/monitoring/drift_detection.py"

          if [ ! -f templates/service/app/_pandera_schema.py ]; then
            echo "::error::templates/service/app/_pandera_schema.py is missing (PR-R2-4)."
            status=1
          fi

          for symbol in validate_predict_payload validate_predict_batch; do
            if ! grep -q "from common_utils.input_validation" "$fastapi_app"; then
              echo "::error file=$fastapi_app::missing 'from common_utils.input_validation' import (PR-R2-4)."
              status=1
              break
            fi
            # Two occurrences expected: import + call site. Anything else
            # means someone removed the wiring or deleted the call.
            count=$(grep -c "$symbol" "$fastapi_app" || true)
            if [ "$count" -lt 2 ]; then
              echo "::error file=$fastapi_app::expected import + call for $symbol (got $count occurrences)."
              status=1
            fi
          done

          if ! grep -q "validate_drift_dataframe" "$drift_py"; then
            echo "::error file=$drift_py::drift_detection.py must call validate_drift_dataframe before PSI (PR-R2-4)."
            status=1
          fi
          if ! grep -q "DriftSchemaError" "$drift_py"; then
            echo "::error file=$drift_py::drift_detection.py must catch DriftSchemaError and exit 3 (PR-R2-4)."
            status=1
          fi

          exit $status

  kubernetes-validate:
    name: Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        # Pinned version, direct release tarball (no unauthenticated GH
        # API call, no `curl | bash`). Upgrading this pin is an explicit
        # PR; the CI lint added in PR-R2-5 rejects future :latest /
        # raw.githubusercontent.com / hack-dir installs.
        run: |
          set -euo pipefail
          KCVER=v0.6.7
          curl -sSL -o /tmp/kubeconform.tgz \
            "https://github.com/yannh/kubeconform/releases/download/${KCVER}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tgz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate base manifests
        run: |
          kubeconform -strict -ignore-missing-schemas \
            templates/k8s/base/deployment.yaml \
            templates/k8s/base/hpa.yaml \
            templates/k8s/base/service.yaml \
            templates/k8s/base/serviceaccount.yaml \
            templates/k8s/base/cronjob-drift.yaml \
            templates/k8s/base/networkpolicy.yaml \
            templates/k8s/base/rbac.yaml

      - name: Install kustomize
        # Direct release tarball (not raw.githubusercontent.com/hack/).
        # The upstream install_kustomize.sh piped into bash hit the
        # unauthenticated GitHub releases API and failed under the
        # per-IP rate limiter; see golden-path.yml for the same pattern.
        run: |
          set -euo pipefail
          KVER=v5.4.3
          curl -sSL -o /tmp/kustomize.tgz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KVER}/kustomize_${KVER}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tgz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/
          kustomize version

      - name: Validate Kustomize build (base)
        run: kustomize build templates/k8s/base/ > /dev/null

      - name: Base neutrality lint (PR-R2-3, audit R2)
        # The base manifest must NOT carry environment-specific values;
        # those belong in overlays. Regressions from this rule made
        # `environment: production` ship in dev deployments and forced
        # operators to debug "why is this pod labeled production?".
        #
        # Allowed in base:
        #   * `replicas:` >= HPA `minReplicas` (the floor)
        #   * `namespace: ml-services` ONLY in kustomization.yaml
        #     (default for `kustomize build base/` standalone)
        # Forbidden in base RESOURCES (deployment/rbac/networkpolicy/
        # promrule/etc.):
        #   * `environment: <anything>` label
        #   * explicit `namespace:` field
        #   * `replicas:` below HPA minReplicas
        run: |
          set -euo pipefail
          status=0
          # 1. No `environment:` label in base resources
          if grep -nE '^[[:space:]]+environment:' \
               templates/k8s/base/*.yaml; then
            echo "::error::Base manifests must not hardcode an environment label (PR-R2-3). Move it to the overlay."
            status=1
          fi
          # 2. No explicit `namespace:` outside kustomization.yaml.
          # Match `namespace:` at any indentation, on yaml files other
          # than kustomization.yaml.
          if grep -nE '^[[:space:]]+namespace:' \
               templates/k8s/base/*.yaml \
               | grep -v '^templates/k8s/base/kustomization.yaml:' \
               | grep -v '^templates/k8s/base/[^:]*:[0-9]*:[[:space:]]*#' ; then
            echo "::error::Base resources must not hardcode namespace: -- overlay namespace field is the single source of truth (PR-R2-3)."
            status=1
          fi
          # 3. Base deployment replicas must be >= HPA minReplicas.
          dep_replicas=$(grep -E '^[[:space:]]+replicas:' templates/k8s/base/deployment.yaml | head -1 | awk '{print $2}')
          hpa_min=$(grep -E '^[[:space:]]+minReplicas:' templates/k8s/base/hpa.yaml | head -1 | awk '{print $2}')
          if [ -n "$dep_replicas" ] && [ -n "$hpa_min" ] && [ "$dep_replicas" -lt "$hpa_min" ]; then
            echo "::error::Deployment replicas ($dep_replicas) < HPA minReplicas ($hpa_min); HPA cannot scale below its floor (PR-R2-3)."
            status=1
          fi
          exit $status

      - name: Validate Kustomize builds (all 6 overlays)
        # Each env (dev/staging/prod) for each cloud (gcp/aws) MUST render
        # cleanly. Catches: missing patches, broken namespace.yaml, image
        # name typos. Aligned with deploy-{gcp,aws}.yml overlay_path values.
        run: |
          set -e
          for overlay in gcp-dev gcp-staging gcp-prod aws-dev aws-staging aws-prod; do
            echo "→ Validating templates/k8s/overlays/$overlay"
            kustomize build "templates/k8s/overlays/$overlay" > /dev/null
          done
          echo "✓ All 6 overlays render cleanly"

      - name: Image digest pinning (PR-R2-2, audit R2)
        # Audit finding: init container `google/cloud-sdk:slim` and
        # CronJob `{service}-predictor:latest` lived outside the
        # signed/digest-pinned image chain. Now every overlay maps
        # `cloud-cli-image` via Kustomize, so digest pinning at the
        # overlay level reaches BOTH the deployment AND every CronJob
        # that uses {service}-predictor.
        #
        # Behavior tiers:
        #   *-dev    : warn-only (moving tags allowed)
        #   *-staging: warn-only (operator may pin via bootstrap runbook)
        #   *-prod   : warning today; flips to error in PR-R2-3 once the
        #              bootstrap runbook is exercised in CI
        run: |
          set -euo pipefail
          status=0
          for overlay in gcp-dev gcp-staging gcp-prod aws-dev aws-staging aws-prod; do
            rendered=$(kustomize build "templates/k8s/overlays/$overlay")
            unpinned=$(echo "$rendered" \
              | grep -E '^[[:space:]]+image:' \
              | grep -v '@sha256:' || true)
            if [ -n "$unpinned" ]; then
              case "$overlay" in
                *-prod)
                  echo "::warning::[$overlay] image refs not pinned by digest:"
                  echo "$unpinned" | sed "s|^|::warning::[$overlay]   |"
                  echo "::warning::PR-R2-3 will harden this to a hard error once the bootstrap runbook is wired."
                  ;;
                *)
                  echo "[$overlay] image refs not pinned by digest (allowed in $overlay tier):"
                  echo "$unpinned" | sed "s|^|[$overlay]   |"
                  ;;
              esac
            fi
            # Hard rule (already in scope today): no `:latest` literal in
            # any rendered overlay output. Operators who want moving tags
            # in dev should use a versioned tag, not `:latest`, so audit
            # trail records what was actually deployed.
            if echo "$rendered" | grep -E '^[[:space:]]+image:.*:latest( |$)'; then
              echo "::error file=templates/k8s/overlays/$overlay::Rendered overlay contains a ':latest' image reference. Use a versioned tag or pin by digest."
              status=1
            fi
          done
          exit $status

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Validate GCP (live)
        run: |
          cd templates/infra/terraform/gcp
          terraform init -backend=false -upgrade=false
          terraform validate

      - name: Validate AWS (live)
        run: |
          cd templates/infra/terraform/aws
          terraform init -backend=false -upgrade=false
          terraform validate

      # ADR-015 PR-A2 — bootstrap layer: state bucket + KMS + registry.
      # Bootstrap uses LOCAL state (chicken-and-egg with the bucket it
      # creates), so `init -backend=false` is the natural fit even though
      # there's no `backend` block to disable.
      - name: Validate GCP (bootstrap)
        run: |
          cd templates/infra/terraform/gcp/bootstrap
          terraform init -backend=false -upgrade=false
          terraform validate

      - name: Validate AWS (bootstrap)
        run: |
          cd templates/infra/terraform/aws/bootstrap
          terraform init -backend=false -upgrade=false
          terraform validate

  example-e2e:
    name: Example End-to-End (train → serve → test → drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: examples/minimal/requirements.txt

      - name: Install dependencies
        run: pip install -r examples/minimal/requirements.txt

      - name: Train model
        working-directory: examples/minimal
        run: python train.py

      - name: Verify artifacts exist
        working-directory: examples/minimal
        run: |
          test -f artifacts/model.joblib
          test -f artifacts/metrics.json
          test -f artifacts/reference.csv
          echo "✓ All training artifacts generated"

      - name: Start API server
        working-directory: examples/minimal
        run: |
          uvicorn serve:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/health | python -m json.tool
          echo "✓ API server healthy"

      - name: Run tests (health + predict + drift check + SHAP)
        working-directory: examples/minimal
        run: pytest test_service.py -v --tb=short

      - name: Run drift detection
        working-directory: examples/minimal
        run: |
          # Exit codes: 0=no drift, 1=warning, 2=alert — all valid demo outcomes
          # The demo intentionally simulates drift, so exit 2 is expected
          python drift_check.py || [ $? -le 2 ]

      - name: Verify quality gates from metrics
        working-directory: examples/minimal
        run: |
          python -c "
          import json
          m = json.load(open('artifacts/metrics.json'))
          assert m['all_passed'], f'Quality gates failed: {m}'
          assert m['roc_auc'] >= 0.65, f'ROC-AUC {m[\"roc_auc\"]} < 0.65'
          print(f'✓ Quality gates passed: ROC-AUC={m[\"roc_auc\"]:.4f}, F1={m[\"f1_score\"]:.4f}, DIR={m[\"disparate_impact_ratio\"]:.4f}')
          "

  docker-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: templates/service/Dockerfile
          failure-threshold: error

  agentic-system:
    name: Agentic System Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate agentic configuration (strict)
        # Verifies: rule frontmatter + glob matching, skill SKILL.md contracts,
        # workflow frontmatter, and AGENTS.md cross-references.
        # --strict treats warnings (missing fields, broken cross-references)
        # as failures. Glob misses are reported as informational notes only,
        # so this stays green as the template grows downstream-only patterns.
        run: |
          pip install --quiet pyyaml
          python scripts/validate_agentic.py --strict

      - name: Shell script syntax check
        run: |
          bash -n scripts/bootstrap.sh
          bash -n scripts/_lib/*.sh
          bash -n scripts/test_scaffold.sh
          echo "✓ All shell scripts parse cleanly"

  scaffold-e2e:
    name: Scaffolder End-to-End Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Install kustomize
        # Direct release tarball, pinned version (PR-R2-5).
        run: |
          set -euo pipefail
          KVER=v5.4.3
          curl -sSL -o /tmp/kustomize.tgz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KVER}/kustomize_${KVER}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tgz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/
          kustomize version

      - name: Run scaffolder end-to-end test
        # Executes templates/scripts/new-service.sh in a tmp dir. With
        # SCAFFOLD_SMOKE=1, additionally:
        #   - creates a venv for the scaffolded service
        #   - installs requirements.txt
        #   - generates tests/contract/openapi.snapshot.json
        #   - runs pytest on test_api.py + test_training.py + contract/
        #
        # Without the flag, only structural validations run (kustomize,
        # placeholders, syntax) — kept fast for local invocation.
        env:
          SCAFFOLD_SMOKE: "1"
        run: bash scripts/test_scaffold.sh
