# Validate Templates CI
# Proves the repo is alive — validates K8s, Terraform, and Python templates.
# Runs on every push and PR to main.

name: Validate Templates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-quality:
    name: Python Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install flake8 black isort mypy

      - name: Check formatting (black)
        run: black --check --line-length=120 templates/service/ templates/common_utils/

      - name: Check imports (isort)
        run: isort --check --profile=black --line-length=120 templates/service/ templates/common_utils/

      - name: Lint (flake8)
        run: flake8 --max-line-length=120 --extend-ignore=E203,W503 templates/service/ templates/common_utils/

  kubernetes-validate:
    name: Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate base manifests
        run: |
          kubeconform -strict -ignore-missing-schemas \
            templates/k8s/base/deployment.yaml \
            templates/k8s/base/hpa.yaml \
            templates/k8s/base/service.yaml \
            templates/k8s/base/serviceaccount.yaml \
            templates/k8s/base/cronjob-drift.yaml \
            templates/k8s/base/networkpolicy.yaml \
            templates/k8s/base/rbac.yaml

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Validate Kustomize build (base)
        run: kustomize build templates/k8s/base/ > /dev/null

      - name: Validate Kustomize build (GCP overlay)
        run: kustomize build templates/k8s/overlays/gcp-production/ > /dev/null

      - name: Validate Kustomize build (AWS overlay)
        run: kustomize build templates/k8s/overlays/aws-production/ > /dev/null

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Validate GCP
        run: |
          cd templates/infra/terraform/gcp
          terraform init -backend=false -upgrade=false
          terraform validate

      - name: Validate AWS
        run: |
          cd templates/infra/terraform/aws
          terraform init -backend=false -upgrade=false
          terraform validate

  example-e2e:
    name: Example End-to-End (train → serve → test → drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: examples/minimal/requirements.txt

      - name: Install dependencies
        run: pip install -r examples/minimal/requirements.txt

      - name: Train model
        working-directory: examples/minimal
        run: python train.py

      - name: Verify artifacts exist
        working-directory: examples/minimal
        run: |
          test -f artifacts/model.joblib
          test -f artifacts/metrics.json
          test -f artifacts/reference.csv
          echo "✓ All training artifacts generated"

      - name: Start API server
        working-directory: examples/minimal
        run: |
          uvicorn serve:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/health | python -m json.tool
          echo "✓ API server healthy"

      - name: Run tests (health + predict + drift check + SHAP)
        working-directory: examples/minimal
        run: pytest test_service.py -v --tb=short

      - name: Run drift detection
        working-directory: examples/minimal
        run: |
          # Exit codes: 0=no drift, 1=warning, 2=alert — all valid demo outcomes
          # The demo intentionally simulates drift, so exit 2 is expected
          python drift_check.py || [ $? -le 2 ]

      - name: Verify quality gates from metrics
        working-directory: examples/minimal
        run: |
          python -c "
          import json
          m = json.load(open('artifacts/metrics.json'))
          assert m['all_passed'], f'Quality gates failed: {m}'
          assert m['roc_auc'] >= 0.65, f'ROC-AUC {m[\"roc_auc\"]} < 0.65'
          print(f'✓ Quality gates passed: ROC-AUC={m[\"roc_auc\"]:.4f}, F1={m[\"f1_score\"]:.4f}, DIR={m[\"disparate_impact_ratio\"]:.4f}')
          "

  docker-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: templates/service/Dockerfile
          failure-threshold: error

  agentic-system:
    name: Agentic System Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate agentic configuration
        # Verifies: rule frontmatter + glob matching, skill SKILL.md contracts,
        # workflow frontmatter, and AGENTS.md cross-references.
        run: python scripts/validate_agentic.py

      - name: Shell script syntax check
        run: |
          bash -n scripts/bootstrap.sh
          bash -n scripts/_lib/*.sh
          bash -n scripts/test_scaffold.sh
          echo "✓ All shell scripts parse cleanly"

  scaffold-e2e:
    name: Scaffolder End-to-End Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Run scaffolder end-to-end test
        # Executes templates/scripts/new-service.sh in a tmp dir, verifies:
        # - zero unreplaced {ServiceName}/{service}/{SERVICE} placeholders
        # - critical files + directories exist
        # - all generated Python parses
        # - both kustomize overlays render (GCP + AWS)
        # - pytest can collect the scaffolded tests
        run: bash scripts/test_scaffold.sh
