# Pre-commit hooks — MANDATORY first-filter for contributors.
#
# This is the FIRST gate before any code enters the repo. CI is the
# last-line safety net (it re-runs these same hooks on every PR via
# `validate-templates.yml`), but pre-commit must catch the 90% case
# at commit time, before a PR is even opened. If pre-commit is green
# locally, CI's lint lane must be green too — same config, same
# versions, no drift.
#
# Install (ONE command — covers both pre-commit AND pre-push stages):
#
#   pip install pre-commit
#   pre-commit install                   # reads default_install_hook_types below
#
# Run all (debug or one-shot full sweep):
#
#   pre-commit run --all-files
#
# Two-stage design (both installed by default via default_install_hook_types):
#
#   pre-commit stage (< 5s): formatting, lint, type check, security lint,
#     secret detection. Blocks the commit itself.
#
#   pre-push stage (~60s): scaffold smoke test. Catches dependency-graph
#     and placeholder-substitution bugs the fast lane cannot — e.g. a
#     contributor adding a test that imports a package not in
#     `templates/service/requirements.txt` passes black + flake8 but
#     fails scaffold-time (CI failure of 2026-04-27 is exactly this
#     class). Blocks the push.
#
# Versions are pinned to match `.github/workflows/validate-templates.yml`.
# Drift between local and CI means green local → red CI, which is the
# failure mode this config exists to prevent. CI runs
# `pre-commit run --all-files` since 2026-04-28 so these versions ARE
# the single source of truth.
#
# For the per-service hook config, see `templates/.pre-commit-config.yaml`.

# Auto-install both stages when contributor runs `pre-commit install`
# once. Previously they had to remember `--hook-type pre-push` too,
# which almost nobody did — pre-push hooks silently never ran.
default_install_hook_types: [pre-commit, pre-push]

# fail_fast: false is the DEFAULT (shown explicit for intent) — we
# want contributors to see EVERY violation in one run, not stop at
# the first. Fewer commit → fix → commit → fix → commit cycles.
fail_fast: false

repos:
  - repo: https://github.com/psf/black
    # 25.1.0 fixes the f-string-with-regex parser bug that 24.4.2 hit
    # on templates/service/tests/test_api.py:201. See commit history.
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=120"]
        files: ^(templates/service/|templates/common_utils/|examples/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile=black", "--line-length=120"]
        files: ^(templates/service/|templates/common_utils/|examples/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--extend-ignore=E203,W503"]
        files: ^(templates/service/|templates/common_utils/|examples/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/data\/|
            ^.*\/models\/|
            ^.*\/mlruns\/|
            ^.*\/__pycache__\/|
            ^.*\.ipynb$
          )

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^.*\.md$
      - id: end-of-file-fixer
        exclude: ^.*\.md$
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # mypy + bandit scope: REAL Python only.
  # `templates/service/src/{service}/` is template territory — the
  # `{service}` segment is a placeholder that new-service.sh
  # substitutes at scaffold time. Running static analysis on the
  # un-substituted templates explodes (mypy: "{service} is not a
  # valid Python package name"). The scaffolded SERVICE gets its
  # OWN per-service hook config (templates/.pre-commit-config.yaml).
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args:
          - "--python-version=3.11"
          - "--ignore-missing-imports"
          - "--no-strict-optional"
        files: ^(templates/common_utils/|examples/|scripts/)
        exclude: >
          (?x)(
            ^\.venv/|
            ^.*\/tests\/|
            ^.*\/__pycache__\/|
            ^scripts/test_scaffold\.sh$
          )
        additional_dependencies:
          - "pydantic>=2.0"
          - "types-PyYAML"
          - "types-requests"

  # Security lint — bandit catches obvious patterns (eval, hardcoded
  # tmp paths, shell=True, weak crypto). `-ll -i` = LOW severity LOW
  # confidence threshold ignored, so we get medium+ only — enough
  # signal without overwhelming.
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-ll", "-i"]
        files: ^(templates/common_utils/|examples/|scripts/)
        exclude: ^.*\/tests\/

  # Secret detection with gitleaks (D-17, D-18 invariants)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret detection)
        description: Detect hardcoded secrets in template code
        args: ["--config=.gitleaks.toml"]
        pass_filenames: false

  # Project's OWN gates — run them locally so contributors don't
  # wait for CI to discover an agentic-config drift. These are
  # cheap (< 2s each) and they're already required by CI; running
  # locally is pure win.
  - repo: local
    hooks:
      - id: validate-agentic
        name: validate agentic system (rules/skills/workflows/AGENTS.md)
        description: |
          Runs scripts/validate_agentic.py --strict to catch drift
          between AGENTS.md and the agent runtime config (rules,
          skills, workflows). Same script CI runs.
        entry: python scripts/validate_agentic.py --strict
        language: system
        pass_filenames: false
        files: ^(AGENTS\.md|\.windsurf/|\.cursor/|\.claude/|scripts/validate_agentic\.py)
      - id: ci-autofix-policy-contract
        name: CI autofix policy contract (ADR-019)
        description: |
          The two governance YAMLs in templates/config/ have a
          contract test (10 invariants). Run it locally on every
          commit that touches them so policy drift never reaches CI.
        # --noconftest: the sibling conftest.py imports numpy (needed
        # for the service test suite but not for this contract test).
        # --rootdir: avoids pytest walking up to the repo pyproject.toml
        # which applies coverage plugins this hook doesn't need.
        entry: python -m pytest templates/service/tests/test_ci_autofix_policy_contract.py -q -o addopts="" --noconftest --rootdir=.
        language: system
        pass_filenames: false
        files: ^(templates/config/(ci_autofix_policy|model_routing_policy)\.yaml|templates/service/tests/test_ci_autofix_policy_contract\.py)$

  # Pre-push: scaffold smoke test. Catches dependency-graph + scaffolder
  # regressions that the fast hooks above cannot:
  #   - missing entries in templates/service/requirements.txt that any
  #     test or src module imports
  #   - new {placeholder} variables added to templates without matching
  #     substitution rules in new-service.sh
  #   - K8s manifest names that violate RFC 1123 after substitution
  #     (PR-A5b territory)
  # Local hook (no remote rev) so contributors get exactly the same
  # bash script CI runs — no version drift possible.
  - repo: local
    hooks:
      - id: scaffold-smoke
        name: scaffold smoke test (~60s)
        description: |
          Run scripts/test_scaffold.sh end-to-end before push. Catches
          the dependency-graph and placeholder-substitution failure
          modes that no fast formatter check can detect.
        entry: bash scripts/test_scaffold.sh
        language: system
        # `pass_filenames: false` because the script doesn't take
        # filenames — it scaffolds a fresh service from scratch.
        pass_filenames: false
        # Only on pre-push, not on every commit. ~60s is too slow for
        # commit-time but acceptable on push.
        stages: [pre-push]
        # Always run, regardless of which files changed. A change to
        # templates/scripts/new-service.sh affects everything;
        # restricting `files:` would create false-negatives.
        always_run: true
