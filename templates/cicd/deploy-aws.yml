name: "Deploy — AWS (dev → staging → prod)"

# Environment promotion chain with human-gated transitions (mirror of
# deploy-gcp.yml; uses IRSA-compatible OIDC, NOT static AWS keys — D-18).
#
# Required Environments (configure manually in GitHub Settings):
#   * aws-dev         — auto-deploy, no reviewers
#   * aws-staging     — required_reviewers: 1 (tech lead)
#   * aws-production  — required_reviewers: 2, wait_timer: 5m,
#                       deployment_branches: main + version tags only
#
# Required Environment SECRETS per environment:
#   * AWS_ROLE_ARN (OIDC federated role for this env)
# Required Environment VARS:
#   * AWS_REGION, AWS_REGISTRY_ID, EKS_<ENV>_CLUSTER

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.AWS_REGISTRY_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      version: ${{ steps.version.outputs.v }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BUILD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin ${{ env.REGISTRY }}

      - name: Compute version
        id: version
        run: |
          V="${GITHUB_REF_NAME}"
          if [ "${V}" = "main" ]; then
            V="main-$(git rev-parse --short HEAD)"
          fi
          echo "v=${V}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          for SERVICE in ServiceA; do
            docker build -t ${{ env.REGISTRY }}/${SERVICE}:${{ steps.version.outputs.v }} ${SERVICE}/
            docker push ${{ env.REGISTRY }}/${SERVICE}:${{ steps.version.outputs.v }}
          done

      - name: Sign images with Cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          for SERVICE in ServiceA; do
            cosign sign --yes ${{ env.REGISTRY }}/${SERVICE}:${{ steps.version.outputs.v }}
          done

  deploy-dev:
    needs: build
    uses: ./.github/workflows/deploy-common.yml
    with:
      cloud: aws
      environment: dev
      cluster_name: ${{ vars.EKS_DEV_CLUSTER }}
      region: ${{ vars.AWS_REGION }}
      overlay_path: k8s/overlays/aws-dev
      version: ${{ needs.build.outputs.version }}
      services: '["ServiceA"]'
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-staging:
    needs: [build, deploy-dev]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/deploy-common.yml
    with:
      cloud: aws
      environment: staging
      cluster_name: ${{ vars.EKS_STAGING_CLUSTER }}
      region: ${{ vars.AWS_REGION }}
      overlay_path: k8s/overlays/aws-staging
      version: ${{ needs.build.outputs.version }}
      services: '["ServiceA"]'
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-prod:
    needs: [build, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/deploy-common.yml
    with:
      cloud: aws
      environment: production
      cluster_name: ${{ vars.EKS_PROD_CLUSTER }}
      region: ${{ vars.AWS_REGION }}
      overlay_path: k8s/overlays/aws-prod
      version: ${{ needs.build.outputs.version }}
      services: '["ServiceA"]'
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
