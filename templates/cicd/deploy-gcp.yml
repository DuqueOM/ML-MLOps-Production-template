name: "Deploy — GCP (dev → staging → prod)"

# Environment promotion chain with human-gated transitions:
#
#   main / tag push
#        │
#   [build-and-push]  ← AUTO
#        │
#   [deploy-dev]      ← AUTO (GitHub Environment `gcp-dev` — no reviewers)
#        │
#   [deploy-staging]  ← CONSULT (GitHub Environment `gcp-staging` — 1 reviewer)
#        │
#   [deploy-prod]     ← STOP (GitHub Environment `gcp-production` — 2 reviewers + 5m wait)
#
# GitHub Environment Protection Rules are configured in the repo Settings
# → Environments. The PROTECTION lives there, not in this YAML — the YAML
# only declares which environment each job targets.
#
# Required Environments (configure manually in GitHub Settings):
#   * gcp-dev         — auto-deploy, no reviewers
#   * gcp-staging     — required_reviewers: 1 (tech lead)
#   * gcp-production  — required_reviewers: 2, wait_timer: 5m,
#                       deployment_branches: main + version tags only

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/ml-images

jobs:
  # ---------------------------------------------------------------------
  # 1. Build + push images ONCE (reused across dev/staging/prod)
  # ---------------------------------------------------------------------
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      version: ${{ steps.version.outputs.v }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Compute version
        id: version
        run: |
          V="${GITHUB_REF_NAME}"
          if [ "${V}" = "main" ]; then
            V="main-$(git rev-parse --short HEAD)"
          fi
          echo "v=${V}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          # TODO: Loop over your services
          for SERVICE in ServiceA; do
            docker build -t ${{ env.REGISTRY }}/${SERVICE}:${{ steps.version.outputs.v }} ${SERVICE}/
            docker push ${{ env.REGISTRY }}/${SERVICE}:${{ steps.version.outputs.v }}
          done

      - name: Sign images with Cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          for SERVICE in ServiceA; do
            IMG="${{ env.REGISTRY }}/${SERVICE}:${{ steps.version.outputs.v }}"
            cosign sign --yes "${IMG}"
          done

      # -------------------------------------------------------------------
      # SLSA provenance (L3 intent, L1-L2 actual until we also add hermetic
      # builds and tamper-proof builder). Generated by slsa-github-generator
      # and attached as a Cosign attestation so admission controllers can
      # verify the image was built by THIS repo at THIS commit.
      # -------------------------------------------------------------------
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: "${{ env.REGISTRY }}/ServiceA:${{ steps.version.outputs.v }}"
          format: cyclonedx-json
          output-file: sbom-ServiceA.cyclonedx.json

      - name: Attach SBOM as attestation
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          for SERVICE in ServiceA; do
            IMG="${{ env.REGISTRY }}/${SERVICE}:${{ steps.version.outputs.v }}"
            cosign attest --yes --type cyclonedx \
              --predicate "sbom-${SERVICE}.cyclonedx.json" "${IMG}"
          done

  # ---------------------------------------------------------------------
  # 1b. SLSA provenance (ROADMAP — ADR-013)
  # ---------------------------------------------------------------------
  # Today: SBOM attestation above gives L1 (build process documented).
  # Next step to reach SLSA L3 (image integrity + builder isolation):
  #
  #   provenance:
  #     needs: build
  #     permissions:
  #       id-token: write
  #       contents: read
  #       actions: read
  #       packages: write
  #     uses: slsa-framework/slsa-github-generator/.github/workflows/\
  #           generator_container_slsa3.yml@v2.0.0
  #     with:
  #       image: "<registry>/<image>"
  #       digest: "${{ needs.build.outputs.image_digest }}"
  #     secrets:
  #       registry-password: "${{ secrets.GCP_SA_KEY }}"
  #
  # Requires `build` to emit `image_digest` via
  #   docker inspect --format '{{ index .RepoDigests 0 }}' "$IMG" | cut -d@ -f2
  # and add it to the job's `outputs:` block.
  #
  # Not enabled by default because slsa-github-generator v2 pins require a
  # specific Dockerfile layout and breaks on first setup. Enable after
  # verifying your image builds reproducibly.

  # ---------------------------------------------------------------------
  # 2. Deploy to dev (AUTO)
  # ---------------------------------------------------------------------
  deploy-dev:
    needs: build
    uses: ./.github/workflows/deploy-common.yml
    with:
      cloud: gcp
      environment: dev
      cluster_name: ${{ vars.GKE_DEV_CLUSTER }}
      region: ${{ vars.GCP_REGION }}
      overlay_path: k8s/overlays/gcp-dev
      version: ${{ needs.build.outputs.version }}
      services: '["ServiceA"]'
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  # ---------------------------------------------------------------------
  # 3. Deploy to staging (CONSULT — 1 reviewer via Environment Protection)
  # ---------------------------------------------------------------------
  deploy-staging:
    needs: [build, deploy-dev]
    # Only auto-promote when main or tag — feature branches stop at dev
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/deploy-common.yml
    with:
      cloud: gcp
      environment: staging
      cluster_name: ${{ vars.GKE_STAGING_CLUSTER }}
      region: ${{ vars.GCP_REGION }}
      overlay_path: k8s/overlays/gcp-staging
      version: ${{ needs.build.outputs.version }}
      services: '["ServiceA"]'
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  # ---------------------------------------------------------------------
  # 4. Deploy to production (STOP — 2 reviewers + wait timer + branch gate)
  # ---------------------------------------------------------------------
  deploy-prod:
    needs: [build, deploy-staging]
    # Only version tags can reach prod — D-26
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/deploy-common.yml
    with:
      cloud: gcp
      environment: production
      cluster_name: ${{ vars.GKE_PROD_CLUSTER }}
      region: ${{ vars.GCP_REGION }}
      overlay_path: k8s/overlays/gcp-prod
      version: ${{ needs.build.outputs.version }}
      services: '["ServiceA"]'
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
