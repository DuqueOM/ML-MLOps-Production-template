name: "Deploy — GCP (dev → staging → prod)"

# Environment promotion chain with human-gated transitions:
#
#   main / tag push
#        │
#   [build-and-push]  ← AUTO
#        │
#   [deploy-dev]      ← AUTO (GitHub Environment `gcp-dev` — no reviewers)
#        │
#   [deploy-staging]  ← CONSULT (GitHub Environment `gcp-staging` — 1 reviewer)
#        │
#   [deploy-prod]     ← STOP (GitHub Environment `gcp-production` — 2 reviewers + 5m wait)
#
# GitHub Environment Protection Rules are configured in the repo Settings
# → Environments. The PROTECTION lives there, not in this YAML — the YAML
# only declares which environment each job targets.
#
# Required Environments (configure manually in GitHub Settings):
#   * gcp-dev         — auto-deploy, no reviewers
#   * gcp-staging     — required_reviewers: 1 (tech lead)
#   * gcp-production  — required_reviewers: 2, wait_timer: 5m,
#                       deployment_branches: main + version tags only

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/ml-images

jobs:
  # ---------------------------------------------------------------------
  # 1. Build + push images ONCE (reused across dev/staging/prod)
  # ---------------------------------------------------------------------
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      version: ${{ steps.version.outputs.v }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Compute version
        id: version
        run: |
          V="${GITHUB_REF_NAME}"
          if [ "${V}" = "main" ]; then
            V="main-$(git rev-parse --short HEAD)"
          fi
          echo "v=${V}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          # TODO: Loop over your services
          for SERVICE in ServiceA; do
            docker build -t ${{ env.REGISTRY }}/${SERVICE}:${{ steps.version.outputs.v }} ${SERVICE}/
            docker push ${{ env.REGISTRY }}/${SERVICE}:${{ steps.version.outputs.v }}
          done

      - name: Sign images with Cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          for SERVICE in ServiceA; do
            cosign sign --yes ${{ env.REGISTRY }}/${SERVICE}:${{ steps.version.outputs.v }}
          done

  # ---------------------------------------------------------------------
  # 2. Deploy to dev (AUTO)
  # ---------------------------------------------------------------------
  deploy-dev:
    needs: build
    uses: ./.github/workflows/deploy-common.yml
    with:
      cloud: gcp
      environment: dev
      cluster_name: ${{ vars.GKE_DEV_CLUSTER }}
      region: ${{ vars.GCP_REGION }}
      overlay_path: k8s/overlays/gcp-dev
      version: ${{ needs.build.outputs.version }}
      services: '["ServiceA"]'
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  # ---------------------------------------------------------------------
  # 3. Deploy to staging (CONSULT — 1 reviewer via Environment Protection)
  # ---------------------------------------------------------------------
  deploy-staging:
    needs: [build, deploy-dev]
    # Only auto-promote when main or tag — feature branches stop at dev
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/deploy-common.yml
    with:
      cloud: gcp
      environment: staging
      cluster_name: ${{ vars.GKE_STAGING_CLUSTER }}
      region: ${{ vars.GCP_REGION }}
      overlay_path: k8s/overlays/gcp-staging
      version: ${{ needs.build.outputs.version }}
      services: '["ServiceA"]'
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  # ---------------------------------------------------------------------
  # 4. Deploy to production (STOP — 2 reviewers + wait timer + branch gate)
  # ---------------------------------------------------------------------
  deploy-prod:
    needs: [build, deploy-staging]
    # Only version tags can reach prod — D-26
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/deploy-common.yml
    with:
      cloud: gcp
      environment: production
      cluster_name: ${{ vars.GKE_PROD_CLUSTER }}
      region: ${{ vars.GCP_REGION }}
      overlay_path: k8s/overlays/gcp-prod
      version: ${{ needs.build.outputs.version }}
      services: '["ServiceA"]'
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
