name: Retrain — {ServiceName}

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for retraining (e.g., PSI drift, scheduled, manual)"
        required: true
      optuna_trials:
        description: "Number of Optuna trials"
        required: false
        default: "50"

# Required GitHub Variables (no static cloud creds — D-18):
#   GCP_WIF_PROVIDER     — Workload Identity Federation provider resource path
#   GCP_SERVICE_ACCOUNT  — SA email used by GCS reads/writes
#   MLFLOW_TRACKING_URI  — MLflow server URL
#   MODEL_BUCKET         — GCS bucket for model artifacts

env:
  SERVICE: "{ServiceName}"
  SERVICE_SLUG: "{service}"

jobs:
  retrain:
    name: Retrain Model
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for GCP WIF / AWS IAM role assumption
      contents: read
      issues: write     # for gate-failure / C/C decision issues
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r ${{ env.SERVICE }}/requirements.txt

      # Cloud auth (parametrized by MODEL_BUCKET_KIND var — audit High-7).
      - name: Authenticate to GCP (WIF)
        if: vars.MODEL_BUCKET_KIND == 'gcs'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to AWS (OIDC)
        if: vars.MODEL_BUCKET_KIND == 's3'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download fresh training data
        env:
          KIND: ${{ vars.DATA_BUCKET_KIND }}
          BUCKET: ${{ vars.DATA_BUCKET }}
          SERVICE: ${{ env.SERVICE }}
        run: |
          set -euo pipefail
          if [ -z "${KIND:-}" ] || [ -z "${BUCKET:-}" ]; then
            echo "::error::DATA_BUCKET_KIND and DATA_BUCKET vars are required for retraining."
            exit 1
          fi
          # Paths must match what `Validate data`, `Execute training`,
          # and the Champion/Challenger evaluation step read — those
          # use `data/raw/latest.csv` and `data/raw/holdout.csv`.
          mkdir -p "${SERVICE}/data/raw"
          case "$KIND" in
            gcs) gcloud storage cp "gs://${BUCKET}/${SERVICE}/training/latest.csv" "${SERVICE}/data/raw/latest.csv" ;;
            s3)  aws s3 cp "s3://${BUCKET}/${SERVICE}/training/latest.csv" "${SERVICE}/data/raw/latest.csv" ;;
            *)   echo "::error::Unsupported DATA_BUCKET_KIND=$KIND"; exit 1 ;;
          esac
          # Holdout for Champion/Challenger evaluation
          case "$KIND" in
            gcs) gcloud storage cp "gs://${BUCKET}/${SERVICE}/holdout/latest.csv" "${SERVICE}/data/raw/holdout.csv" ;;
            s3)  aws s3 cp "s3://${BUCKET}/${SERVICE}/holdout/latest.csv" "${SERVICE}/data/raw/holdout.csv" ;;
          esac
          echo "✓ training rows: $(wc -l < ${SERVICE}/data/raw/latest.csv)"
          echo "✓ holdout rows:  $(wc -l < ${SERVICE}/data/raw/holdout.csv)"

      - name: Validate data
        run: |
          cd ${{ env.SERVICE }}
          python -c "
          from src.${{ env.SERVICE_SLUG }}.schemas import ServiceInputSchema
          import pandas as pd
          df = pd.read_csv('data/raw/latest.csv')
          ServiceInputSchema.validate(df)
          print(f'Validation passed: {len(df)} rows')
          "

      - name: Execute training
        id: train
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          cd ${{ env.SERVICE }}
          python src/${{ env.SERVICE_SLUG }}/training/train.py \
            --data data/raw/latest.csv \
            --experiment "${{ env.SERVICE }}-retrain-$(date +%Y%m%d)" \
            --optuna-trials ${{ github.event.inputs.optuna_trials }} \
            | tee training_output.json

      - name: Check quality gates
        id: gates
        run: |
          cd ${{ env.SERVICE }}
          # Parse training output for quality gate results
          python -c "
          import json
          with open('training_output.json') as f:
              result = json.load(f)
          gates = result['quality_gates']
          if not gates['all_passed']:
              print(f'FAILED gates: {gates[\"failed\"]}')
              exit(1)
          print('All quality gates PASSED')
          "

      - name: Download current champion (if any)
        id: champion
        continue-on-error: true
        env:
          KIND: ${{ vars.MODEL_BUCKET_KIND }}
          BUCKET: ${{ vars.MODEL_BUCKET }}
          SERVICE: ${{ env.SERVICE }}
        run: |
          set -euo pipefail
          cd "${SERVICE}"
          mkdir -p models/champion
          if [ -z "${KIND:-}" ] || [ -z "${BUCKET:-}" ]; then
            echo "::warning::MODEL_BUCKET_KIND/MODEL_BUCKET unset — treating as no-champion bootstrap"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OBJECT="${SERVICE}/production/model.joblib"
          DEST="models/champion/model.joblib"
          # Don't fail the workflow if the champion is absent (first run);
          # downstream Champion/Challenger step gates on `found`.
          case "$KIND" in
            gcs) gcloud storage cp "gs://${BUCKET}/${OBJECT}" "$DEST" 2>/dev/null || true ;;
            s3)  aws s3 cp     "s3://${BUCKET}/${OBJECT}"  "$DEST" 2>/dev/null || true ;;
          esac
          if [ -f "$DEST" ]; then
            echo "✓ Champion downloaded from ${KIND}://${BUCKET}/${OBJECT}"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "→ No champion at ${KIND}://${BUCKET}/${OBJECT} (cold start)"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Champion vs Challenger statistical comparison
        id: cvsc
        if: steps.gates.outcome == 'success' && steps.champion.outputs.found == 'true'
        run: |
          cd ${{ env.SERVICE }}
          python -m src.${{ env.SERVICE_SLUG }}.evaluation.champion_challenger \
            --champion models/champion/model.joblib \
            --challenger models/model.joblib \
            --holdout data/raw/holdout.csv \
            --target target \
            --config configs/champion_challenger.yaml \
            --output reports/champion_challenger.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Post C/C decision as Actions step summary
        if: always() && steps.cvsc.outcome != 'skipped'
        run: |
          cd ${{ env.SERVICE }}
          python -c "
          import json, pathlib
          p = pathlib.Path('reports/champion_challenger.json')
          if not p.exists():
              print('No C/C report produced')
              raise SystemExit
          r = json.loads(p.read_text())
          d = r['decision']
          b = r['bootstrap']
          print('## Champion/Challenger decision: ', d['decision'])
          print('Reason:', d['reason'])
          print('ΔAUC (point):', b.get('delta_auc_point'))
          print('95% CI:', [b.get('delta_auc_ci_lower'), b.get('delta_auc_ci_upper')])
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Promote model (if gates pass AND C/C == promote OR no champion)
        id: promote
        if: steps.gates.outcome == 'success' && (steps.champion.outputs.found == 'false' || steps.cvsc.outputs.exit_code == '0')
        env:
          KIND: ${{ vars.MODEL_BUCKET_KIND }}
          BUCKET: ${{ vars.MODEL_BUCKET }}
          SERVICE: ${{ env.SERVICE }}
        run: |
          set -euo pipefail
          if [ -z "${KIND:-}" ] || [ -z "${BUCKET:-}" ]; then
            echo "::error::MODEL_BUCKET_KIND/MODEL_BUCKET vars must be set to promote."
            exit 1
          fi
          cd "${SERVICE}"
          SHA=$(sha256sum models/model.joblib | awk '{print $1}')
          echo "Promoting models/model.joblib (sha256:${SHA:0:16}…) to ${KIND}://${BUCKET}/${SERVICE}/production/"
          # Upload TWO copies: timestamped (audit trail) + current (for next champion fetch)
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          case "$KIND" in
            gcs)
              gcloud storage cp models/model.joblib "gs://${BUCKET}/${SERVICE}/production/model.joblib"
              gcloud storage cp models/model.joblib "gs://${BUCKET}/${SERVICE}/archive/model-${STAMP}.joblib"
              ;;
            s3)
              aws s3 cp models/model.joblib "s3://${BUCKET}/${SERVICE}/production/model.joblib"
              aws s3 cp models/model.joblib "s3://${BUCKET}/${SERVICE}/archive/model-${STAMP}.joblib"
              ;;
          esac
          # MLflow registry transition (if MLFLOW_TRACKING_URI is set).
          # The `--alias production` mark is the contract the deploy chain
          # reads when fetching the model on next pod startup.
          if [ -n "${MLFLOW_TRACKING_URI:-}" ]; then
            python -m src.${{ env.SERVICE_SLUG }}.training.promote_to_mlflow \
              --model-path models/model.joblib \
              --service "${SERVICE}" \
              --alias production || echo "::warning::MLflow promotion failed (non-fatal)"
          fi

      - name: Block promotion (C/C blocked or keep)
        if: steps.cvsc.outputs.exit_code == '2' || steps.cvsc.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const decision = '${{ steps.cvsc.outputs.exit_code }}' === '2' ? 'BLOCKED' : 'KEPT (no promotion)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Champion/Challenger: ${decision} — ${{ env.SERVICE }}`,
              body: `Trigger: ${{ github.event.inputs.reason }}\n\nOutcome: ${decision}\n\nSee workflow artifact reports/champion_challenger.json for full statistical report (McNemar p, ΔAUC CI, decision rationale).`,
              labels: ['ml-retraining', 'champion-challenger']
            });

      - name: Create failure issue (if gates fail)
        if: steps.gates.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Retraining quality gate failure: ${{ env.SERVICE }}`,
              body: `Retraining triggered by: ${{ github.event.inputs.reason }}\n\nQuality gates failed. Current production model retained.\n\nCheck workflow run for details.`,
              labels: ['ml-retraining', 'quality-gate-failure']
            });

      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-${{ env.SERVICE }}-${{ github.run_number }}
          path: |
            ${{ env.SERVICE }}/training_output.json
            ${{ env.SERVICE }}/models/model_metadata.json
