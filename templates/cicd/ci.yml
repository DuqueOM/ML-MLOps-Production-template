name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flake8 black isort mypy

      - name: flake8
        run: flake8 src/ app/ tests/ --max-line-length=120

      - name: black
        run: black --check src/ app/ tests/

      - name: isort
        run: isort --check-only src/ app/ tests/

      - name: mypy
        run: mypy src/ app/ --ignore-missing-imports

  test:
    name: Test — ${{ matrix.service }} / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        service:
          # TODO: Add your services here
          - ServiceA
          # - ServiceB
          # - ServiceC
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r ${{ matrix.service }}/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          pytest tests/ \
            --cov=src --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            --junitxml=results/junit.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          name: ${{ matrix.service }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}-py${{ matrix.python-version }}
          path: ${{ matrix.service }}/results/

  security-audit:
    name: Security Audit — secrets, SAST, IaC
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Gitleaks — scan for secrets (D-17)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Hardcoded credential patterns (D-17)
        run: |
          set -euo pipefail
          if grep -rEI "AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|ghp_[A-Za-z0-9]{36}" \
               --include="*.py" --include="*.yaml" --include="*.yml" --include="*.tf" .; then
            echo "::error::Hardcoded credential pattern detected (D-17 violation)"
            exit 1
          fi
          if grep -rE "os\.environ\[.(API_KEY|SECRET|TOKEN|PASSWORD)" --include="*.py" .; then
            echo "::error::Direct os.environ access to secret-like names — use common_utils.secrets.get_secret instead (D-17)"
            exit 1
          fi

      - name: IRSA/Workload Identity enforcement (D-18)
        run: |
          # In staging/prod K8s manifests, ServiceAccounts must have IRSA or WI annotation
          for manifest in k8s/overlays/*-staging/*.yaml k8s/overlays/*-production/*.yaml; do
            [ -f "$manifest" ] || continue
            if grep -qE "kind:\s*ServiceAccount" "$manifest"; then
              if ! grep -qE "(eks.amazonaws.com/role-arn|iam.gke.io/gcp-service-account)" "$manifest"; then
                echo "::error file=$manifest::ServiceAccount missing IRSA/WI annotation (D-18)"
                exit 1
              fi
            fi
          done

  build:
    name: Build, Sign & Attest — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, security-audit]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write    # required for cosign keyless (OIDC)
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          # TODO: Add your services here
          - ServiceA
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        id: build
        run: |
          IMAGE="${{ matrix.service }}:${{ github.sha }}"
          docker build -t "$IMAGE" ${{ matrix.service }}/
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan (blocker: HIGH/CRITICAL)
        # Pinned to immutable tag (D-19, ADR-014 §1.1). Dependabot updates
        # via .github/dependabot.yml. Phase 5 will harden to commit-SHA.
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.build.outputs.image }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX JSON) — SLSA L2 component (D-19)
        run: |
          syft "${{ steps.build.outputs.image }}" -o cyclonedx-json > sbom.cyclonedx.json
          syft "${{ steps.build.outputs.image }}" -o spdx-json > sbom.spdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}-${{ github.sha }}
          path: sbom.*.json
          retention-days: 90

      # TODO: Push to registry (uncomment and configure per cloud)
