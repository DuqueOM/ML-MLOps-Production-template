name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flake8 black isort mypy

      - name: flake8
        run: flake8 src/ app/ tests/ --max-line-length=120

      - name: black
        run: black --check src/ app/ tests/

      - name: isort
        run: isort --check-only src/ app/ tests/

      - name: mypy
        run: mypy src/ app/ --ignore-missing-imports

  test:
    name: Test — ${{ matrix.service }} / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        service:
          # Single-service repo: scaffolder substitutes {ServiceName}.
          # Multi-service repo: replace with explicit list, e.g. - billing, - fraud.
          - {ServiceName}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r ${{ matrix.service }}/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          pytest tests/ \
            --cov=src --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            --junitxml=results/junit.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          name: ${{ matrix.service }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}-py${{ matrix.python-version }}
          path: ${{ matrix.service }}/results/

  contract-check:
    name: API contract — snapshot ↔ version pair-change (D-28)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        service:
          - {ServiceName}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the PR base + HEAD to diff against.
          fetch-depth: 0

      - name: Detect snapshot ↔ version pair-change
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          SVC="${{ matrix.service }}"

          SNAPSHOT="${SVC}/tests/contract/openapi.snapshot.json"
          MAIN="${SVC}/app/main.py"

          # Did the PR change the snapshot?
          if git diff --name-only "$BASE" "$HEAD" | grep -qx "$SNAPSHOT"; then
            echo "Snapshot changed in this PR — verifying paired version bump."

            # main.py must also have changed.
            if ! git diff --name-only "$BASE" "$HEAD" | grep -qx "$MAIN"; then
              echo "::error file=$SNAPSHOT::OpenAPI snapshot changed without a matching change to $MAIN. Bump app.version per rule 14 §semver."
              exit 1
            fi

            # And the version literal must be different between base and head.
            BASE_V=$(git show "${BASE}:${MAIN}" 2>/dev/null | grep -E "^\s*version\s*=" | head -1 || true)
            HEAD_V=$(git show "${HEAD}:${MAIN}" 2>/dev/null | grep -E "^\s*version\s*=" | head -1 || true)
            if [ "$BASE_V" = "$HEAD_V" ] && [ -n "$BASE_V" ]; then
              echo "::error file=$MAIN::Snapshot changed but app.version line is identical to base. Bump it (rule 14 §semver)."
              exit 1
            fi

            echo "✓ Pair-change verified: snapshot AND app.version both updated."
          else
            echo "Snapshot unchanged — pair-change rule does not apply."
          fi

  security-audit:
    name: Security Audit — secrets, SAST, IaC
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Gitleaks — scan for secrets (D-17)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Hardcoded credential patterns (D-17)
        run: |
          set -euo pipefail
          if grep -rEI "AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|ghp_[A-Za-z0-9]{36}" \
               --include="*.py" --include="*.yaml" --include="*.yml" --include="*.tf" .; then
            echo "::error::Hardcoded credential pattern detected (D-17 violation)"
            exit 1
          fi
          if grep -rE "os\.environ\[.(API_KEY|SECRET|TOKEN|PASSWORD)" --include="*.py" .; then
            echo "::error::Direct os.environ access to secret-like names — use common_utils.secrets.get_secret instead (D-17)"
            exit 1
          fi

      - name: IRSA/Workload Identity enforcement (D-18)
        run: |
          # In staging/prod K8s manifests, ServiceAccounts must have IRSA or WI annotation
          for manifest in k8s/overlays/*-staging/*.yaml k8s/overlays/*-production/*.yaml; do
            [ -f "$manifest" ] || continue
            if grep -qE "kind:\s*ServiceAccount" "$manifest"; then
              if ! grep -qE "(eks.amazonaws.com/role-arn|iam.gke.io/gcp-service-account)" "$manifest"; then
                echo "::error file=$manifest::ServiceAccount missing IRSA/WI annotation (D-18)"
                exit 1
              fi
            fi
          done

  build:
    name: Build, Sign & Attest — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, security-audit]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write    # required for cosign keyless (OIDC)
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - {ServiceName}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        id: build
        run: |
          IMAGE="${{ matrix.service }}:${{ github.sha }}"
          docker build -t "$IMAGE" ${{ matrix.service }}/
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan (blocker: HIGH/CRITICAL)
        # Pinned to immutable tag (D-19, ADR-014 §1.1). Dependabot updates
        # via .github/dependabot.yml. Phase 5 will harden to commit-SHA.
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.build.outputs.image }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX JSON) — SLSA L2 component (D-19)
        run: |
          syft "${{ steps.build.outputs.image }}" -o cyclonedx-json > sbom.cyclonedx.json
          syft "${{ steps.build.outputs.image }}" -o spdx-json > sbom.spdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}-${{ github.sha }}
          path: sbom.*.json
          retention-days: 90

      # Push + sign + attest live in deploy-{gcp,aws}.yml (D-19, ADR-014 §3.2).
      # Why not here:
      #   - cosign sign requires an image+digest in a registry → push first
      #   - push requires cloud creds (WIF for GCP, IRSA for AWS) which are
      #     scoped to the deploy workflows by environment Protection Rules
      # Kyverno's trust regexp in templates/k8s/policies/kyverno-image-verification.yaml
      # accepts signatures from ci.yml, deploy-gcp.yml, or deploy-aws.yml so
      # the trust chain stays honest about where signing actually happens.
      - name: Install Cosign (used by deploy workflows; verify-only here)
        uses: sigstore/cosign-installer@v3

      - name: Emit build provenance summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Build Summary — ${{ matrix.service }}

          - **Commit**: \`${{ github.sha }}\`
          - **Image**: \`${{ steps.build.outputs.image }}\`
          - **SBOM**: CycloneDX + SPDX attached as artifact
          - **Signatures**: $(cosign verify --certificate-identity-regexp ".*" "${{ steps.build.outputs.image }}" 2>/dev/null && echo "✓ signed" || echo "⚠ dev build (unsigned)")
          EOF
