      #   id: push
      #   run: |
      #     # Use Workload Identity Federation, NOT a JSON key (D-18)
      #     gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
      #     FULL_REF="${GCP_REGISTRY}/${{ matrix.service }}:${{ github.sha }}"
      #     docker tag "${{ steps.build.outputs.image }}" "$FULL_REF"
      #     DIGEST=$(docker push "$FULL_REF" | tee /dev/stderr | grep -oE 'sha256:[a-f0-9]{64}')
      #     echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # - name: Sign image with Cosign (keyless, OIDC) — D-19
      #   run: |
      #     # Keyless signing: identity proven via GitHub OIDC; no private key management
      #     cosign sign --yes "${GCP_REGISTRY}/${{ matrix.service }}@${{ steps.push.outputs.digest }}"

      # - name: Attest SBOM — SLSA L2
      #   run: |
      #     cosign attest --yes \
      #       --predicate sbom.cyclonedx.json \
      #       --type cyclonedx \
      #       "${GCP_REGISTRY}/${{ matrix.service }}@${{ steps.push.outputs.digest }}"

      - name: Emit build provenance summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Build Summary — ${{ matrix.service }}

          - **Commit**: \`${{ github.sha }}\`
          - **Image**: \`${{ steps.build.outputs.image }}\`
          - **SBOM**: CycloneDX + SPDX attached as artifact
          - **Signatures**: $(cosign verify --certificate-identity-regexp ".*" "${{ steps.build.outputs.image }}" 2>/dev/null && echo "✓ signed" || echo "⚠ dev build (unsigned)")
          EOF
