name: "Reusable — Deploy to Environment"

# Reusable workflow called by deploy-gcp.yml, deploy-aws.yml, and the
# promote-staging / promote-prod gates. Centralizes build/push/apply/verify
# so fixes (e.g., smoke-test hardening) apply to all callers.
#
# CI fan-in (dev → staging → prod) requires a SEPARATE caller workflow per
# environment so that GitHub Environment Protection Rules apply the right
# `required_reviewers` gate. This reusable workflow handles the mechanics;
# the caller controls the gate.

on:
  workflow_call:
    inputs:
      cloud:
        description: "gcp or aws"
        required: true
        type: string
      environment:
        description: "dev | staging | production"
        required: true
        type: string
      cluster_name:
        required: true
        type: string
      region:
        required: true
        type: string
      overlay_path:
        description: "Kustomize overlay dir relative to repo root (e.g. k8s/overlays/gcp-prod)"
        required: true
        type: string
      version:
        description: "Image tag to deploy (sha, semver, or branch)"
        required: true
        type: string
      services:
        description: "JSON array of service dirnames, e.g. '[\"billing\",\"fraud\"]'. Scaffolder substitutes {ServiceName} for single-service repos."
        required: false
        default: '["{ServiceName}"]'
        type: string
      image_digests:
        description: "JSON object mapping service name → image digest (sha256:...). Required for staging/prod (D-19 + Kyverno digest gate). Falls back to overlay's tag if empty (dev only)."
        required: false
        default: '{}'
        type: string
      namespace:
        description: "K8s namespace where the deploy lands (default: {service}-{env}). Used by smoke test to address services with FQDN."
        required: false
        default: ''
        type: string
    # GCP uses WIF (no secrets needed). AWS needs the federated role ARN
    # passed by the caller because role-to-assume cannot live in `vars`
    # if it differs per environment-namespace (governance + blast radius).
    # Required GitHub Variables (per repo Settings → Variables):
    #   GCP   — GCP_WIF_PROVIDER, GCP_SERVICE_ACCOUNT, GCP_PROJECT_ID, GCP_REGION
    #   AWS   — AWS_REGION, AWS_ACCOUNT_ID  (the ROLE_ARN is a per-env secret)
    secrets:
      AWS_ROLE_ARN:
        description: "AWS IAM Role ARN for OIDC federated assumption. Required when cloud=aws."
        required: false

jobs:
  deploy:
    name: "Deploy to ${{ inputs.cloud }} / ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    # The environment name carries Protection Rules (required_reviewers,
    # wait timers, deployment branches). Configure in GitHub repo settings
    # → Environments → <env-name>.
    environment: ${{ inputs.cloud }}-${{ inputs.environment }}
    permissions:
      id-token: write     # OIDC to cloud
      contents: read
    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # Cloud auth — branches on input.cloud to keep one workflow reusable
      # -------------------------------------------------------------------
      - name: Authenticate to GCP (Workload Identity Federation — D-18)
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Configure GKE credentials
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ inputs.cluster_name }}
          location: ${{ inputs.region }}

      - name: Authenticate to AWS (IRSA-compatible OIDC)
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Configure EKS credentials
        if: inputs.cloud == 'aws'
        run: |
          aws eks update-kubeconfig \
            --name ${{ inputs.cluster_name }} \
            --region ${{ inputs.region }}

      - name: Verify cluster context
        run: |
          CONTEXT=$(kubectl config current-context)
          echo "Current context: ${CONTEXT}"
          kubectl cluster-info
          # Sanity: refuse to apply to prod from a non-prod branch (extra
          # guard; GH Environment Protection is the primary gate)
          if [ "${{ inputs.environment }}" = "production" ] && \
             [ "${GITHUB_REF_NAME}" != "main" ] && \
             [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Production deploys must be from main or a version tag"
            exit 1
          fi

      - name: Resolve target namespace
        id: ns
        run: |
          NS="${{ inputs.namespace }}"
          if [ -z "$NS" ]; then
            # Default: first service name + env (matches overlay's namespace.yaml)
            FIRST_SVC=$(echo '${{ inputs.services }}' | jq -r '.[0]' | tr 'A-Z' 'a-z')
            ENV_SUFFIX="${{ inputs.environment }}"
            # Map 'production' to 'prod' to align with overlay names
            [ "$ENV_SUFFIX" = "production" ] && ENV_SUFFIX="prod"
            NS="${FIRST_SVC}-${ENV_SUFFIX}"
          fi
          echo "namespace=${NS}" >> $GITHUB_OUTPUT
          echo "→ Target namespace: ${NS}"

      # -------------------------------------------------------------------
      # Dynamic Behavior Protocol pre-check (ADR-010, ADR-014 §4.2).
      # Query risk_context. If live signals would escalate the static mode
      # to STOP, abort the deploy. Graceful degradation: if Prometheus
      # and file signals are both unavailable, we keep the static mode
      # and continue (ADR-010 fallback contract).
      # -------------------------------------------------------------------
      - name: Compute dynamic risk mode
        id: risk
        env:
          PROMETHEUS_URL: ${{ vars.PROMETHEUS_URL }}
          STATIC_MODE: ${{ inputs.environment == 'production' && 'STOP' || (inputs.environment == 'staging' && 'CONSULT' || 'AUTO') }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, sys
          sys.path.insert(0, "templates")
          from common_utils.risk_context import get_risk_context, render_audit_line
          base = os.environ["STATIC_MODE"]
          ctx = get_risk_context(ops_dir="ops", cache_key="deploy-${{ inputs.cloud }}-${{ inputs.environment }}")
          final = ctx.escalate(base)
          line = render_audit_line(base, final, ctx)
          print(line)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"final_mode={final}\n")
              fh.write(f"base_mode={base}\n")
              fh.write(f"source={ctx.source}\n")
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as fh:
                  fh.write(f"### Dynamic risk mode\n- {line}\n")
          PY

      - name: Enforce STOP mode
        if: steps.risk.outputs.final_mode == 'STOP' && steps.risk.outputs.base_mode != 'STOP'
        run: |
          echo "::error::Dynamic Behavior Protocol escalated base_mode=${{ steps.risk.outputs.base_mode }} → STOP."
          echo "Signals source: ${{ steps.risk.outputs.source }}. Resolve the signal(s) or override with a human-approved workflow_dispatch."
          exit 1

      # -------------------------------------------------------------------
      # Pin image by digest (D-19 + Kyverno gate, audit Critical-2).
      # The build job emits a JSON map service→digest. We patch the
      # overlay's kustomization.yaml in place so `kubectl apply -k`
      # ships the EXACT image that was scanned/signed/attested.
      # If image_digests is empty (legacy callers / dev workflow_dispatch),
      # we WARN but don't fail — prod gate via Kyverno catches it later.
      # -------------------------------------------------------------------
      - name: Install kustomize
        # Direct release tarball (PR-R2-5). Using the upstream
        # install_kustomize.sh piped into bash violated the
        # supply-chain story AND tripped the unauthenticated GH
        # releases-API rate limiter on shared runners. Pinned version
        # is bumped via an explicit PR.
        run: |
          set -euo pipefail
          KVER=v5.4.3
          curl -sSL -o /tmp/kustomize.tgz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KVER}/kustomize_${KVER}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tgz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/
          kustomize version

      - name: Pin image to digest
        env:
          DIGESTS: ${{ inputs.image_digests }}
        run: |
          set -euo pipefail
          if [ -z "$DIGESTS" ] || [ "$DIGESTS" = "{}" ]; then
            echo "::warning::No image_digests provided. Falling back to overlay tag."
            echo "  Production deploys with Kyverno digest enforcement WILL be rejected."
            exit 0
          fi
          cd ${{ inputs.overlay_path }}
          for svc in $(echo "$DIGESTS" | jq -r 'keys[]'); do
            DIGEST=$(echo "$DIGESTS" | jq -r --arg s "$svc" '.[$s]')
            # kustomize edit set image NAME=NEWNAME@DIGEST replaces the image.
            # The image NAME (left side) must match what overlays/<env>/kustomization.yaml
            # has under `images: - name:` — the scaffolder uses "<svc>-predictor".
            IMG_NAME="$(echo $svc | tr 'A-Z' 'a-z')-predictor"
            # Get the current newName (registry path) from kustomization
            NEW_NAME=$(yq '.images[] | select(.name == "'"$IMG_NAME"'") | .newName' kustomization.yaml)
            if [ -z "$NEW_NAME" ] || [ "$NEW_NAME" = "null" ]; then
              echo "::error::Image $IMG_NAME not found in $(pwd)/kustomization.yaml"
              exit 1
            fi
            echo "→ Pinning $IMG_NAME to $NEW_NAME@$DIGEST"
            kustomize edit set image "${IMG_NAME}=${NEW_NAME}@${DIGEST}"
          done
          echo "Final image refs in overlay:"
          grep -A2 '^images:' kustomization.yaml

      - name: Apply Kustomize overlay
        run: |
          kubectl apply -k ${{ inputs.overlay_path }}

      # PR-C1 (ADR-015): patch the deployment_id annotation AFTER apply
      # so the value is `<env>-<run_id>-<run_attempt>` and not the
      # template's literal "local". Patching the Deployment template
      # triggers a controlled rollout — this is the canonical event
      # marking "this revision corresponds to that workflow run".
      # Pods then expose `DEPLOYMENT_ID` via the Downward API. We
      # patch BEFORE waiting for rollout so the rollout we then watch
      # is the new revision, not the unpatched one.
      - name: Stamp deployment_id annotation
        env:
          NAMESPACE: ${{ steps.ns.outputs.namespace }}
          DEPLOYMENT_ID: "${{ inputs.environment }}-${{ github.run_id }}-${{ github.run_attempt }}"
        run: |
          set -euo pipefail
          for svc in $(echo '${{ inputs.services }}' | jq -r '.[]'); do
            DEPLOY="$(echo $svc | tr 'A-Z' 'a-z')-predictor"
            echo "→ Stamping $DEPLOY with deployment_id=$DEPLOYMENT_ID"
            kubectl patch deployment "$DEPLOY" -n "$NAMESPACE" \
              --patch '{"spec":{"template":{"metadata":{"annotations":{"windsurf.io/deployment-id":"'"$DEPLOYMENT_ID"'"}}}}}'
          done

      - name: Wait for rollout
        env:
          NAMESPACE: ${{ steps.ns.outputs.namespace }}
        run: |
          for svc in $(echo '${{ inputs.services }}' | jq -r '.[]'); do
            DEPLOY="$(echo $svc | tr 'A-Z' 'a-z')-predictor"
            kubectl rollout status "deployment/${DEPLOY}" -n "${NAMESPACE}" --timeout=600s
          done

      # -------------------------------------------------------------------
      # Smoke test — audit Medium-5: namespace-aware + FQDN.
      # Pod runs in the SERVICE's namespace so the short DNS name resolves.
      # FQDN form keeps the test resilient if cluster's DNS search domains
      # are non-default.
      # -------------------------------------------------------------------
      - name: Post-deploy smoke test
        env:
          NAMESPACE: ${{ steps.ns.outputs.namespace }}
        run: |
          for svc in $(echo '${{ inputs.services }}' | jq -r '.[]'); do
            LOWER=$(echo $svc | tr 'A-Z' 'a-z')
            FQDN="${LOWER}-service.${NAMESPACE}.svc.cluster.local"
            POD="smoke-${LOWER}-${GITHUB_RUN_ID}"
            echo "→ Smoke test: GET http://${FQDN}/ready"
            kubectl run "${POD}" -n "${NAMESPACE}" \
              --rm -i --restart=Never \
              --image=curlimages/curl:8.10.1 \
              -- curl -sf --max-time 30 "http://${FQDN}/ready" \
              || { echo "::error::Smoke test failed for ${svc} in namespace ${NAMESPACE}"; exit 1; }
          done

      # ---------------------------------------------------------------------
      # Emit audit entry (ADR-014 §3.5, AGENTS.md §Audit Trail Protocol)
      # Writes to ops/audit.jsonl AND mirrors to the GitHub Actions step
      # summary so the audit shows up directly in the PR/run UI.
      # Runs on success AND failure (if: always) so we capture aborts too.
      # ---------------------------------------------------------------------
      - name: Emit audit entry
        id: audit
        if: always()
        env:
          # Use dynamic mode if the risk step ran; otherwise derive static.
          BASE_MODE: ${{ steps.risk.outputs.base_mode || (inputs.environment == 'production' && 'STOP' || (inputs.environment == 'staging' && 'CONSULT' || 'AUTO')) }}
          FINAL_MODE: ${{ steps.risk.outputs.final_mode || (inputs.environment == 'production' && 'STOP' || (inputs.environment == 'staging' && 'CONSULT' || 'AUTO')) }}
          SIGNAL_SOURCE: ${{ steps.risk.outputs.source || 'unavailable' }}
          # PR-C1 (ADR-015): canonical correlation id for this deploy.
          # Format: <env>-<run_id>-<run_attempt>. Stable across retries
          # of the same workflow run, distinct between attempts. Embeds
          # the GHA run id so a deploy entry, the K8s annotation, and
          # the prediction-log line all share one JOIN key.
          AUDIT_ID: "${{ inputs.environment }}-${{ github.run_id }}-${{ github.run_attempt }}"
          DEPLOYMENT_ID: "${{ inputs.environment }}-${{ github.run_id }}-${{ github.run_attempt }}"
        run: |
          python scripts/audit_record.py \
            --agent "Agent-K8sBuilder" \
            --operation "${{ inputs.cloud }}-${{ inputs.environment }}-deploy" \
            --environment "${{ inputs.environment }}" \
            --base-mode "${BASE_MODE}" \
            --final-mode "${FINAL_MODE}" \
            --result "${{ job.status }}" \
            --inputs '{"cloud":"${{ inputs.cloud }}","cluster":"${{ inputs.cluster_name }}","region":"${{ inputs.region }}","version":"${{ inputs.version }}","services":${{ inputs.services }},"risk_source":"'"${SIGNAL_SOURCE}"'"}' \
            --outputs '{"overlay":"${{ inputs.overlay_path }}","run_id":"${{ github.run_id }}","sha":"${{ github.sha }}"}' \
            --approver "${{ github.actor }}" \
            --audit-id "${AUDIT_ID}" \
            --deployment-id "${DEPLOYMENT_ID}"

      - name: Upload audit log (kept locally also)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ inputs.cloud }}-${{ inputs.environment }}-${{ github.run_id }}
          path: ops/audit.jsonl
          if-no-files-found: warn
          retention-days: 90
