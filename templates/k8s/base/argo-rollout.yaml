# =============================================================================
# Argo Rollouts — Canary Deployment for {ServiceName}
# =============================================================================
# Progressive delivery: sends traffic to the new model version incrementally
# while monitoring Prometheus metrics. Automatically rolls back if error rate
# or latency exceeds thresholds.
#
# Canary steps:
#   1. 10% traffic → pause 2 min (observe metrics)
#   2. 30% traffic → pause 2 min
#   3. 60% traffic → pause 2 min
#   4. 100% traffic → fully promoted
#
# Prerequisites:
#   - Argo Rollouts controller installed: kubectl apply -n argo-rollouts -f https://...
#   - Prometheus configured as AnalysisTemplate metric provider
#   - Istio/Nginx TrafficRouting for weighted traffic splitting
#
# TODO: Replace {service} with your actual service name.
# TODO: Adjust canary step weights and pause durations for your SLA.
# TODO: Configure trafficRouting for your ingress controller.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: "{service-name}-predictor"
  labels:
    app: "{service-name}"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: "{service-name}"
  template:
    metadata:
      labels:
        app: "{service-name}"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: "{service-name}-sa"

      initContainers:
        - name: model-downloader
          image: google/cloud-sdk:slim
          command: ["gsutil", "cp", "gs://{MODEL_BUCKET}/{service-name}/model.joblib", "/models/model.joblib"]
          volumeMounts:
            - name: model-storage
              mountPath: /models

      # Graceful shutdown (D-25)
      terminationGracePeriodSeconds: 30

      containers:
        - name: "{service-name}-predictor"
          image: "{service-name}-predictor:latest"
          command: ["uvicorn"]
          args:
            - "app.main:app"
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--timeout-graceful-shutdown=20"
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: /models/model.joblib
            - name: MODEL_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['version']
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          # Probe split (D-23): see deployment.yaml for full explanation
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true

      volumes:
        - name: model-storage
          emptyDir: {}

  strategy:
    canary:
      # Canary analysis — runs '{service-name}-cc-online' (ADR-008).
      # The AnalysisTemplate itself lives in
      # analysistemplate-champion-challenger.yaml so the C/C rules are
      # version-controlled independently of the rollout manifest.
      # See that file for the 4 proxy metrics (prediction log health,
      # error rate vs stable, score-distribution shift, p95 latency).
      analysis:
        templates:
          - templateName: "{service-name}-cc-online"
        args:
          - name: service-name
            value: "{service}"
          # Populated by Argo Rollouts at canary time:
          - name: canary-version
            valueFrom:
              podTemplateHashValue: Latest
          - name: stable-version
            valueFrom:
              podTemplateHashValue: Stable

      # Progressive traffic shifting — 8 minutes total with analysis
      # firing every 30s for a total of 8 measurements per step pair.
      steps:
        - setWeight: 10
        - pause: { duration: 2m }
        - setWeight: 30
        - pause: { duration: 2m }
        - setWeight: 60
        - pause: { duration: 2m }
        - setWeight: 100

      # Auto-rollback on failure
      maxSurge: 1
      maxUnavailable: 0
