# =============================================================================
# PrometheusRule — Concept drift + sliced performance alerts (ADR-006 / ADR-007)
# =============================================================================
# Alerts fire based on metrics pushed by performance_monitor.py into
# Pushgateway. They differentiate GLOBAL degradation from SLICED degradation
# and carry the slice label so Alertmanager can route to the right team.
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: "{service-name}-performance-alerts"
  labels:
    app: "{service-name}"
    prometheus: kube-prometheus
spec:
  groups:
    - name: "{service}.performance"
      rules:
        # ---------------------------------------------------------------
        # Global concept drift: AUC below hard threshold
        # ---------------------------------------------------------------
        - alert: "{ServiceName}GlobalAUCBelowAlert"
          expr: |
            {service}_performance_metric{slice_name="__global__", metric="auc"} < 0.65
          for: 30m
          labels:
            severity: critical
            service: "{service-name}"
            category: concept_drift
            action: page
          annotations:
            summary: "Global AUC below alert threshold"
            description: |
              Global AUC is {{ $value | printf "%.3f" }} (< 0.65).
              This indicates concept drift across the whole population.
              Action: investigate recent data/label quality, consider retraining.
            runbook_url: "https://github.com/{owner}/{repo}/blob/main/RUNBOOK.md#concept-drift"

        # ---------------------------------------------------------------
        # Sliced concept drift: a single slice degraded severely
        # ---------------------------------------------------------------
        - alert: "{ServiceName}SlicedAUCBelowAlert"
          expr: |
            {service}_performance_metric{slice_name!="__global__", metric="auc"} < 0.65
            and
            {service}_performance_sample_size >= 50
          for: 30m
          labels:
            severity: critical
            service: "{service-name}"
            category: sliced_concept_drift
            action: page
          annotations:
            summary: "AUC below alert threshold for slice {{ $labels.slice_name }}={{ $labels.slice_value }}"
            description: |
              AUC={{ $value | printf "%.3f" }} for slice
              {{ $labels.slice_name }}={{ $labels.slice_value }} (< 0.65).
              Sliced degradation often points to a subpopulation-specific issue:
              data pipeline, feature engineering, or label quality for that group.
            runbook_url: "https://github.com/{owner}/{repo}/blob/main/RUNBOOK.md#sliced-drift"

        # ---------------------------------------------------------------
        # F1 collapse — even if AUC is okay
        # ---------------------------------------------------------------
        - alert: "{ServiceName}F1BelowAlert"
          expr: |
            {service}_performance_metric{metric="f1"} < 0.45
            and
            {service}_performance_sample_size >= 50
          for: 30m
          labels:
            severity: warning
            service: "{service-name}"
            category: performance_regression
            action: ticket
          annotations:
            summary: "F1 below alert for {{ $labels.slice_name }}={{ $labels.slice_value }}"
            description: |
              F1={{ $value | printf "%.3f" }}. Check threshold calibration
              and class balance in window.
            runbook_url: "https://github.com/{owner}/{repo}/blob/main/RUNBOOK.md#f1-regression"

        # ---------------------------------------------------------------
        # Heartbeat: performance monitor stopped reporting
        # ---------------------------------------------------------------
        - alert: "{ServiceName}PerformanceMonitorStale"
          expr: |
            time() - {service}_performance_last_run_timestamp > 172800
          for: 1h
          labels:
            severity: warning
            service: "{service-name}"
            category: monitoring_health
            action: ticket
          annotations:
            summary: "Performance monitor has not reported in 48h"
            description: |
              The {service-name}-performance-monitor CronJob has not pushed metrics
              in > 48h. Verify the CronJob is running and ground-truth
              ingestion is producing labels.
            runbook_url: "https://github.com/{owner}/{repo}/blob/main/RUNBOOK.md#performance-monitor-stale"

        # ---------------------------------------------------------------
        # Prediction log failure rate high
        # ---------------------------------------------------------------
        - alert: "{ServiceName}PredictionLogErrorsHigh"
          expr: |
            rate({service}_prediction_log_errors_total[15m])
            /
            (rate({service}_prediction_log_total[15m]) + 0.001)
            > 0.05
          for: 15m
          labels:
            severity: warning
            service: "{service-name}"
            category: observability_degraded
            action: ticket
          annotations:
            summary: "Prediction-log error rate > 5% (closed-loop visibility at risk)"
            description: |
              Prediction-log errors per minute exceed 5% of total.
              D-22 contract swallows these failures — inference is NOT impacted,
              but performance monitoring will have gaps. Check backend health
              (gs://, s3://, or BigQuery).
            runbook_url: "https://github.com/{owner}/{repo}/blob/main/RUNBOOK.md#prediction-log-errors"
