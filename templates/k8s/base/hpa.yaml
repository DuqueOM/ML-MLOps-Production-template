apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: "{service}-hpa"
  labels:
    app: "{service}"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: "{service}-predictor"
  minReplicas: 1
  maxReplicas: 5

  # CPU ONLY — NEVER use memory for ML services
  # Model memory is constant (loaded model = fixed RAM)
  # Memory HPA mathematically cannot scale down
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # 50-70 based on model weight

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min before scaling down
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0     # Scale up immediately
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
