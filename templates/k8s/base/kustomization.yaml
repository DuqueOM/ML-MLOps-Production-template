# =============================================================================
# Kustomize base — common resources for all environments
# =============================================================================
# Usage:
#   kustomize build k8s/base/                     # Render base
#   kustomize build k8s/overlays/gcp-production/   # Render GCP overlay
#   kustomize build k8s/overlays/aws-production/   # Render AWS overlay
#
# TODO: Replace {service} with your actual service name.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ml-services

labels:
  - pairs:
      app: "{service}"
      managed-by: kustomize

resources:
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - serviceaccount.yaml
  - cronjob-drift.yaml
  - cronjob-performance.yaml
  - performance-prometheusrule.yaml
  - networkpolicy.yaml
  - rbac.yaml
