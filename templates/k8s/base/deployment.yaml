apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{service}-predictor"
  labels:
    app: "{service}"
    version: v1.0.0
    environment: production
    managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{service}"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero downtime
  template:
    metadata:
      labels:
        app: "{service}"
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: "{service}-sa"

      # Pod-level securityContext — satisfies PSS 'restricted' (v1.8.1).
      # All containers inherit runAsNonRoot + the seccomp profile.
      # See templates/k8s/policies/pod-security-standards.yaml.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532          # nonroot user; matches distroless images
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      # Init container downloads model from cloud storage.
      # The image NAME is a symbolic placeholder ("cloud-cli-image") that
      # each overlay rewrites via Kustomize `images:` to the real CLI:
      #   - GCP overlays: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
      #   - AWS overlays: public.ecr.aws/aws-cli/aws-cli:latest
      # Production overlays (gcp-prod, aws-prod) MUST also set `digest:`
      # in their kustomization.yaml so the rendered manifest pins the
      # init image by sha256 (PR-R2-2, audit R2). The CI lint in
      # `.github/workflows/validate-templates.yml` enforces this.
      # The `command:` below assumes gsutil; the AWS overlay patches it
      # to `aws s3 cp` via patch-deployment.yaml.
      initContainers:
        - name: model-downloader
          image: cloud-cli-image:placeholder   # rewritten per overlay
          command:
            - gsutil
            - cp
            - gs://{MODEL_BUCKET}/{service}/model.joblib
            - /models/model.joblib
          securityContext:
            # PSS restricted: init container must also pass the gate.
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - name: model-storage
              mountPath: /models

      # Graceful shutdown (D-25): allow in-flight requests to complete.
      # Coordinated with uvicorn's --timeout-graceful-shutdown (see args below).
      terminationGracePeriodSeconds: 30

      containers:
        - name: "{service}-predictor"
          image: "{service}-predictor:latest"   # Patched by Kustomize overlay
          command: ["uvicorn"]
          args:
            - "app.main:app"
            - "--host=0.0.0.0"
            - "--port=8000"
            # NO --workers: default = 1 (K8s HPA manages scale, D-01)
            # Graceful shutdown (D-25): uvicorn waits up to 20s for in-flight
            # requests to finish before forcing exit. Must be LESS than the
            # pod's terminationGracePeriodSeconds (30s) to leave headroom for
            # SIGKILL-handling path.
            - "--timeout-graceful-shutdown=20"
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: MODEL_PATH
              value: /models/model.joblib
            - name: MODEL_VERSION
              value: "v1.0.0"
            - name: BACKGROUND_DATA_PATH
              value: /app/data/reference/background.csv
            # Metric name prefix — fastapi_app.py reads this at import time
            # to build Counter/Histogram names. Audit Critical-3.
            - name: SERVICE_METRIC_PREFIX
              value: "{service}"
          resources:
            requests:
              cpu: "500m"       # TODO: Set based on profiling
              memory: "512Mi"   # TODO: Set based on model size
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          # PSS restricted (v1.8.1) — strictest container-level policy.
          # readOnlyRootFilesystem: true requires writable volumes for temp files
          # (e.g., /tmp for joblib spills). Uncomment the emptyDir below if
          # needed; default is disabled so scaffolded services work out of the box.
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
            # readOnlyRootFilesystem: true    # enable after testing for tmp writes
          # --- Probes (D-23) ---
          # startupProbe: absorbs the slow-start window (model download +
          # warm-up). Prevents the livenessProbe from restarting a pod that
          # is simply still warming up. Once startupProbe succeeds, K8s
          # stops running it and starts using liveness/readiness.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24   # up to 120s total for cold start + warm-up
          # readinessProbe → /ready (503 until warm-up done → traffic gated)
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
          # livenessProbe → /health (always 200 if event loop is alive)
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true

      volumes:
        - name: model-storage
          emptyDir: {}   # Ephemeral — destroyed with the pod
