# =============================================================================
# Namespace — PROD with PSS enforce=restricted (D-29)
# =============================================================================
# Pods MUST: runAsNonRoot, allowPrivilegeEscalation=false,
# capabilities.drop=[ALL], seccompProfile=RuntimeDefault, no hostPath/host*.
# See templates/k8s/base/deployment.yaml for the securityContext block.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: "{service-name}-prod"
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    app.kubernetes.io/managed-by: kustomize
    environment: production
