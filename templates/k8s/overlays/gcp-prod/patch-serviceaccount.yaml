# =============================================================================
# GCP Production — ServiceAccount with Workload Identity (D-18)
# =============================================================================
# Workload Identity lets K8s pods authenticate to GCP APIs without
# static credentials. The pod's KSA maps to a GCP IAM SA.
#
# Setup (one-time): see docs/runbooks/gcp-wif-setup.md
#
# TODO: Replace {PROJECT_ID}, {service} with your actual values.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{service-name}-sa"
  annotations:
    iam.gke.io/gcp-service-account: "{service-name}-sa@{PROJECT_ID}.iam.gserviceaccount.com"
