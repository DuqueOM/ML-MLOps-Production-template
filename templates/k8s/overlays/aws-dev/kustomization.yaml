apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: "{service-name}-dev"

resources:
  - ../../base
  - namespace.yaml

images:
  - name: "{service-name}-predictor"
    newName: "{AWS_ACCOUNT_ID}.dkr.ecr.{REGION}.amazonaws.com/{service-name}-predictor"
    newTag: "v1.0.0"
  # Init container CLI — dev tier may use a moving tag (PR-R2-2, ADR-016).
  # Staging/prod overlays must add `digest: sha256:...`; see bootstrap
  # runbook `docs/runbooks/digest-pin-init-image.md`.
  - name: "cloud-cli-image"
    newName: "public.ecr.aws/aws-cli/aws-cli"
    newTag: "2"

patches:
  - path: patch-deployment.yaml
  - path: patch-serviceaccount.yaml
