# =============================================================================
# Kustomize overlay — GCP Dev (GKE)
# =============================================================================
# Smallest footprint: 1 replica, dev-tier resources, baseline PSS.
# Used by templates/cicd/deploy-gcp.yml for auto-deploy on every push to main.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: "{service}-dev"

resources:
  - ../../base
  - namespace.yaml

images:
  - name: "{service}-predictor"
    newName: "{REGION}-docker.pkg.dev/{PROJECT_ID}/ml-images/{service}-predictor"
    newTag: "v1.0.0"
  # Init container CLI — dev tier may use a moving tag; staging/prod must
  # pin by digest (PR-R2-2, ADR-016). The base manifest references this
  # name symbolically; this `newName` rewires it to the real GCP CLI.
  - name: "cloud-cli-image"
    newName: "gcr.io/google.com/cloudsdktool/google-cloud-cli"
    newTag: "slim"

patches:
  - path: patch-deployment.yaml
  - path: patch-serviceaccount.yaml
