# =============================================================================
# GCP Staging — Deployment patches
# =============================================================================
# 1 replica + smaller resources. Same WI/init-container pattern as prod so
# the staging deploy validates the integration before promoting.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{service}-predictor"
spec:
  replicas: 1
  template:
    spec:
      initContainers:
        - name: model-downloader
          # Image is set by the overlay's `images:` mapping in
          # kustomization.yaml (PR-R2-2). Setting `image:` here would
          # bypass digest pinning enforced by the CI lint.
          command:
            - gsutil
            - cp
            - "gs://{MODEL_BUCKET}/{service}/model.joblib"
            - /models/model.joblib
          volumeMounts:
            - name: model-storage
              mountPath: /models
      containers:
        - name: "{service}-predictor"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: MODEL_PATH
              value: /models/model.joblib
            - name: LOG_FORMAT
              value: "json"
            - name: LOG_LEVEL
              value: "INFO"
            - name: ENVIRONMENT
              value: "staging"
