# =============================================================================
# GCP Staging — ServiceAccount with Workload Identity
# =============================================================================
# Same WI binding as prod; the staging IAM SA should have read-only access
# to staging GCS buckets only.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{service-name}-sa"
  annotations:
    iam.gke.io/gcp-service-account: "{service-name}-sa-staging@{PROJECT_ID}.iam.gserviceaccount.com"
