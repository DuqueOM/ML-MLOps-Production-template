# =============================================================================
# Kustomize overlay — GCP Staging (GKE)
# =============================================================================
# Mirror of gcp-prod with reduced resources + baseline PSS enforce. Used by
# the dev → staging → prod chain in templates/cicd/deploy-gcp.yml.
#
# Differences vs gcp-prod:
#   - 1 replica (vs 2)
#   - PSS enforce=baseline + warn/audit=restricted (shift-left)
#   - smaller resource requests
#
# Deploy: kustomize build k8s/overlays/gcp-staging/ | kubectl apply -f -
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: "{service-name}-staging"

resources:
  - ../../base
  - namespace.yaml

images:
  - name: "{service-name}-predictor"
    newName: "{REGION}-docker.pkg.dev/{PROJECT_ID}/ml-images/{service-name}-predictor"
    newTag: "v1.0.0"
  # Init container CLI — staging pins by digest (PR-R2-2, ADR-016).
  # CI lint (validate-templates.yml) WARNS until digest is set; the
  # bootstrap runbook (`docs/runbooks/digest-pin-init-image.md`)
  # documents the operator-side resolve step.
  - name: "cloud-cli-image"
    newName: "gcr.io/google.com/cloudsdktool/google-cloud-cli"
    newTag: "slim"
    # digest: "sha256:<resolve via bootstrap runbook>"

patches:
  - path: patch-deployment.yaml
  - path: patch-serviceaccount.yaml
