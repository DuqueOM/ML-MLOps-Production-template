# =============================================================================
# AWS Production — ServiceAccount with IRSA (D-18)
# =============================================================================
# IAM Roles for Service Accounts (IRSA) lets EKS pods authenticate
# to AWS APIs without static credentials.
#
# Setup (one-time): see docs/runbooks/aws-irsa-setup.md
#
# TODO: Replace {AWS_ACCOUNT_ID}, {service} with your actual values.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{service-name}-sa"
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::{AWS_ACCOUNT_ID}:role/{service-name}-irsa-role"
