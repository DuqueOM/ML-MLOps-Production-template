# =============================================================================
# AlertManager rules for ML services
# =============================================================================
# These rules fire when:
#   1. The service is down or error rate spikes (P1 — page on-call)
#   2. Inference latency degrades (P2 — investigate within 1h)
#   3. Drift detection CronJob stops running (P2 — heartbeat alert)
#   4. PSI drift exceeds threshold (P3 — trigger retraining)
#   5. Resource limits are being approached (P4 — capacity planning)
#
# TODO: Replace {service} with your actual service name.
# TODO: Adjust thresholds based on your service's baseline measurements.
# =============================================================================
groups:
  - name: "{service}-service-health"
    rules:
      # --- P1: Service Down ---
      - alert: "{service}ServiceDown"
        expr: up{job="{service}"} == 0
        for: 2m
        labels:
          severity: critical
          service: "{service}"
          action: page
        annotations:
          summary: "{service} is down"
          description: "No healthy pods for {service} in the last 2 minutes."
          runbook_url: "docs/runbooks/runbook-template.md#p1-service-down"

      # --- P1: Error Rate Spike ---
      - alert: "{service}HighErrorRate"
        expr: |
          rate({service}_requests_total{status="500"}[5m])
          / rate({service}_requests_total[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
          service: "{service}"
          action: page
        annotations:
          summary: "Error rate > 5% for {service}"
          description: "{{ $value | humanizePercentage }} of requests are failing."
          runbook_url: "docs/runbooks/runbook-template.md#p1-error-rate"

      # --- P2: High Latency ---
      - alert: "{service}HighLatency"
        expr: |
          histogram_quantile(0.95,
            rate({service}_request_duration_seconds_bucket{endpoint="/predict"}[5m])
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          service: "{service}"
          action: ticket
        annotations:
          summary: "P95 latency > 1s for {service}"
          description: "P95 inference latency is {{ $value | humanizeDuration }}."
          runbook_url: "docs/runbooks/runbook-template.md#p2-latency"

  - name: "{service}-drift-detection"
    rules:
      # --- P2: Drift Heartbeat Missing (CronJob broken) ---
      # This is the most critical monitoring rule for ML in production.
      # If the drift detection CronJob stops running, you lose visibility
      # into model degradation. This fires if no run in 48h.
      - alert: "{service}DriftDetectionHeartbeatMissing"
        expr: |
          time() - drift_detection_last_run_timestamp{job="{service}-drift-detection"} > 172800
        for: 10m
        labels:
          severity: warning
          service: "{service}"
          action: page
        annotations:
          summary: "Drift detection CronJob hasn't run in 48h"
          description: |
            The drift detection CronJob for {service} hasn't pushed metrics
            in {{ $value | humanizeDuration }}. Check CronJob status:
              kubectl get cronjobs -n ml-services
              kubectl describe cronjob {service}-drift-detection -n ml-services
          runbook_url: "docs/runbooks/runbook-template.md#p2-drift-heartbeat"

      # --- P3: PSI Drift Alert ---
      - alert: "{service}DriftAlert"
        expr: "{service}_psi_score > 0.20"
        for: 0m
        labels:
          severity: info
          service: "{service}"
          action: ticket
        annotations:
          summary: "PSI drift detected for {{ $labels.feature }}"
          description: |
            Feature {{ $labels.feature }} has PSI={{ $value }}, above alert threshold 0.20.
            Action: Investigate root cause, then trigger /retrain if confirmed.
          runbook_url: "docs/runbooks/runbook-template.md#p3-drift-alert"

      # --- P3: PSI Drift Warning ---
      - alert: "{service}DriftWarning"
        expr: "{service}_psi_score > 0.10 and {service}_psi_score <= 0.20"
        for: 0m
        labels:
          severity: info
          service: "{service}"
          action: notify
        annotations:
          summary: "Elevated PSI for {{ $labels.feature }}"
          description: "Feature {{ $labels.feature }} PSI={{ $value }}. Monitor closely."
          runbook_url: "docs/runbooks/runbook-template.md#p3-drift-warning"

  - name: "{service}-resources"
    rules:
      # --- P4: CPU Approaching Limit ---
      - alert: "{service}HighCPU"
        expr: |
          rate(container_cpu_usage_seconds_total{container="{service}-predictor"}[5m])
          / container_spec_cpu_quota{container="{service}-predictor"}
          * container_spec_cpu_period{container="{service}-predictor"} > 0.85
        for: 10m
        labels:
          severity: info
          service: "{service}"
          action: notify
        annotations:
          summary: "CPU usage > 85% for {service}"
          description: "Consider scaling up maxReplicas or increasing CPU limit."
          runbook_url: "docs/runbooks/runbook-template.md#p4-high-cpu"

      # --- P4: Pod Restarts ---
      - alert: "{service}PodRestarting"
        expr: rate(kube_pod_container_status_restarts_total{container="{service}-predictor"}[15m]) > 0
        for: 5m
        labels:
          severity: warning
          service: "{service}"
          action: page
        annotations:
          summary: "{service} pod restarting"
          description: "Container has restarted {{ $value }} times in the last 15 minutes."
          runbook_url: "docs/runbooks/runbook-template.md#p4-pod-restart"
