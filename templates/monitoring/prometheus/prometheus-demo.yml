# Prometheus config for docker-compose.demo.yml
# Scrapes the ML service + Pushgateway for drift metrics
#
# TODO: Replace {service} with your service name.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ml-service"
    static_configs:
      - targets: ["ml-service:8000"]
    metrics_path: /metrics

  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
